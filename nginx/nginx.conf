events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 10G;

    # Proxy large file streaming without buffering
    proxy_buffering off;
    proxy_request_buffering off;

    server {
        listen 80;
        server_name _;

        # FastAPI backend.
        # Use Docker's embedded DNS with a short TTL and a variable upstream so
        # nginx re-resolves the api container's IP on every request. A static
        # upstream block caches the IP at startup, which breaks with 502s
        # whenever the api container is rebuilt and gets a new address.
        location /api/ {
            resolver 127.0.0.11 valid=10s ipv6=off;
            set $api_upstream http://api:8000;
            proxy_pass         $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # React frontend (static files)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
