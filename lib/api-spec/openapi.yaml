openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: obtv-ai media intelligence platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: media
    description: Media library management
  - name: search
    description: Semantic search
  - name: jobs
    description: Processing jobs
  - name: player
    description: Playback and scene data
  - name: ai
    description: AI Q&A
  - name: clips
    description: Clip lists
  - name: renders
  - name: reels
    description: Prompt-based highlight reels across the library
  - name: people
    description: Cross-asset person identities
  - name: insights
    description: Library-wide AI insights
  - name: trends
    description: External trend correlation (YouTube trending, web news momentum)
  - name: ratings
    description: TV audience ratings (provider-agnostic; CSV import now, measurement APIs later)
  - name: auth
    description: Session authentication
  - name: users
    description: User management (admin only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Media ──────────────────────────────────────────────────────────────────
  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List all media assets
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Case-insensitive match on filename, title, or source path
          schema:
            type: string
        - name: person
          in: query
          description: Only assets a given person (by id) appears in
          schema:
            type: string
        - name: topic
          in: query
          description: Only assets tagged with this topic (normalized key match)
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_desc, created_asc, name_asc, name_desc, duration_desc, duration_asc, size_desc, size_asc]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
    post:
      operationId: ingestMedia
      tags: [media]
      summary: Queue a media file for ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaIngestInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"

  /media/upload:
    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload a media file directly and queue it for ingestion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MediaUploadInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Unsupported file type

  /media/import-link:
    post:
      operationId: importMediaFromLink
      tags: [media]
      summary: Import media from a shared link (e.g. Dropbox) — downloads in the background and queues ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaLinkImportInput"
      responses:
        "202":
          description: Accepted — download queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Invalid or unsupported link

  /media/{id}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get media asset details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "404":
          description: Not found
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Remove media from the library
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /media/{id}/scenes:
    get:
      operationId: getMediaScenes
      tags: [player]
      summary: Get detected scenes for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scene"

  /media/{id}/frame:
    get:
      operationId: getMediaFrame
      tags: [player]
      summary: Extract a single JPEG frame at the given time (seconds)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: t
          in: query
          required: false
          schema:
            type: number
            default: 0
      responses:
        "200":
          description: JPEG frame
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: Media or source file not found

  /media/{id}/markers:
    get:
      operationId: listMarkers
      tags: [player]
      summary: List editor markers/selects for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marker"
    post:
      operationId: createMarker
      tags: [player]
      summary: Add a marker/select/reject at a timecode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"

  /media/{id}/markers/{marker_id}:
    delete:
      operationId: deleteMarker
      tags: [player]
      summary: Delete a marker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: marker_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /media/{id}/transcript:
    get:
      operationId: getMediaTranscript
      tags: [player]
      summary: Get transcript segments for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
          description: ISO language code — return translated text where available
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranscriptSegment"

  /media/{id}/transcript/{segmentId}:
    patch:
      operationId: updateTranscriptSegment
      tags: [player]
      summary: Edit a transcript segment's text (original or a translation)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: segmentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscriptSegmentUpdate"
      responses:
        "200":
          description: Updated segment (text reflects the edited language)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptSegment"
        "404":
          description: Segment not found

  /media/{id}/captions:
    get:
      operationId: getCaptions
      tags: [media]
      summary: Export the transcript as SRT or VTT captions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [srt, vtt]
        - name: lang
          in: query
          required: false
          schema:
            type: string
          description: Translation language code, omit for original
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipExportResult"
        "404":
          description: No transcript available

  /media/{id}/tighten:
    post:
      operationId: tightenMedia
      tags: [media]
      summary: Silence & filler cutter — compute a tightened cut of the asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TightenInput"
      responses:
        "201":
          description: Tightened cut computed; a clip list with the kept segments was created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TightenResult"
        "404":
          description: No transcript available

  /media/{id}/roughcut:
    post:
      operationId: createRoughCut
      tags: [media]
      summary: Stitch the creative pass clip suggestions into a rough cut video
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoughCutInput"
      responses:
        "202":
          description: Rough cut job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReelJob"
        "409":
          description: Asset has no creative clip suggestions yet

  /media/{id}/translate:
    post:
      operationId: createTranslation
      tags: [media]
      summary: Translate the transcript into a target language
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "202":
          description: Translation job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"
        "400":
          description: No transcript available or unsupported language
        "404":
          description: Media not found

  /media/{id}/dub:
    post:
      operationId: createDub
      tags: [media]
      summary: Generate a dubbed audio track from the translated transcript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DubRequest"
      responses:
        "202":
          description: Dub job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"
        "400":
          description: Language not translated yet or dubbing unsupported for language
        "404":
          description: Media not found

  /media/{id}/dub/{lang}/stream:
    get:
      operationId: streamDub
      tags: [player]
      summary: Stream the dubbed audio track for a language
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dubbed audio (AAC in M4A container)
          content:
            audio/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: No dubbed audio for this language

  /media/{id}/faces:
    get:
      operationId: getMediaFaces
      tags: [player]
      summary: Get detected face clusters for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaceCluster"

  /media/{id}/people:
    get:
      operationId: getAssetPeople
      tags: [player]
      summary: People who appear in this asset — face thumbnails plus timecoded speaking and on-camera ranges
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetPerson"

  /media/{id}/highlight:
    post:
      operationId: createHighlight
      tags: [media]
      summary: Generate a highlight reel video from the asset's key moments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Highlight job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  /media/{id}/creative:
    post:
      operationId: createCreativePass
      tags: [media]
      summary: Run the creative editor pass (story beats, clip suggestions, editorial notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Creative pass job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  /media/{id}/social:
    post:
      operationId: createSocialAnalysis
      tags: [media]
      summary: Score the asset's social media potential across platforms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Social analysis job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  /media/{id}/social/cuts:
    post:
      operationId: createSocialCuts
      tags: [media]
      summary: Queue platform-ready cuts (renders) from the asset's key moments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialCutsRequest"
      responses:
        "202":
          description: Render jobs queued
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RenderJob"
        "400":
          description: No key moments available
        "404":
          description: Media not found

  # ── Stats ────────────────────────────────────────────────────────────────
  /media/resume-stalled:
    post:
      operationId: resumeStalledMedia
      tags: [media]
      summary: Re-queue the missing pipeline stages for assets stranded mid-processing with no active jobs
      responses:
        "202":
          description: Resume result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeStalledResult"

  /media/stats/summary:
    get:
      operationId: getLibraryStats
      tags: [media]
      summary: Library-wide stats (counts, totals, status breakdown)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"

  # ── People ─────────────────────────────────────────────────────────────────
  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List identified people across the library (paginated)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 48
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: q
          in: query
          required: false
          description: Case-insensitive name search
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Sort order — most-seen first (default) or name A-Z
          schema:
            type: string
            enum: [appearances, name]
            default: appearances
        - name: faces_only
          in: query
          required: false
          description: Only include people with a detected face — hides voice-only speakers (e.g. off-camera crew picked up by diarization)
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeoplePage"

  /people/co-appearances:
    get:
      operationId: getCoAppearances
      tags: [people]
      summary: Co-appearance graph — who appears together, with shared asset counts and overlapping on-camera time
      parameters:
        - name: named_only
          in: query
          required: false
          description: Only include people with a real name (enrolled, renamed, or auto-recognized); hides unnamed "Person N" / speaker-label placeholders
          schema:
            type: boolean
            default: false
        - name: min_shared
          in: query
          required: false
          description: Only include connections with at least this many shared videos
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoAppearanceGraph"

  /people/enroll:
    post:
      operationId: enrollPerson
      tags: [people]
      summary: Create a person from a reference photo — detects the face, stores its signature, and returns existing people that look like them as merge candidates
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PersonEnrollInput"
      responses:
        "201":
          description: Person created from the photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonEnrollResult"
        "422":
          description: No face detected in the photo

  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      summary: Person profile with per-asset appearances
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetail"
        "404":
          description: Not found
    delete:
      operationId: deletePerson
      tags: [people]
      summary: Delete a person (remove false-positive detections) — appearances and voice-clone data are removed too
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: updatePerson
      tags: [people]
      summary: Rename a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found

  /people/{id}/merge:
    post:
      operationId: mergePerson
      tags: [people]
      summary: Merge another person into this one (fix duplicate identities)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonMergeRequest"
      responses:
        "200":
          description: Merged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found

  /people/{id}/split:
    post:
      operationId: splitPerson
      tags: [people]
      summary: Split one appearance out of a person into a new person (undo a bad merge or identification)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonSplitRequest"
      responses:
        "200":
          description: New person created from the split-out appearance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found
        "409":
          description: Cannot split the person's only appearance

  /people/{id}/unmerge:
    post:
      operationId: unmergePerson
      tags: [people]
      summary: Undo a merge — pull every appearance that came from a merged-in person back out into a restored person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonUnmergeRequest"
      responses:
        "200":
          description: Restored person carrying the unmerged appearances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Person not found, or no appearances from that merge remain

  /people/{id}/appearances/{media_id}:
    get:
      operationId: getPersonAssetMoments
      tags: [people]
      summary: Every timecoded place a person appears in one asset — speaking segments and on-camera ranges
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: media_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonAssetMoments"
        "404":
          description: Person or appearance not found

  /people/{id}/voice:
    get:
      operationId: getVoiceProfile
      tags: [voice]
      summary: A person's voice-clone profile — curated samples and readiness
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceProfile"
        "404":
          description: Person not found

  /people/{id}/voice/samples:
    post:
      operationId: addVoiceSample
      tags: [voice]
      summary: Add a clean voice sample cut from a media asset segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceSampleFromSegment"
      responses:
        "202":
          description: Sample extraction queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceSample"
        "400":
          description: Invalid segment (bad range or too long)
        "404":
          description: Person or media not found

  /people/{id}/voice/samples/upload:
    post:
      operationId: uploadVoiceSample
      tags: [voice]
      summary: Upload a clean audio file as a voice sample
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/VoiceSampleUploadInput"
      responses:
        "202":
          description: Sample accepted, normalization queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceSample"
        "400":
          description: Unsupported file type
        "404":
          description: Person not found

  /voice/samples/{id}:
    delete:
      operationId: deleteVoiceSample
      tags: [voice]
      summary: Remove a voice sample
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /voice/samples/{id}/audio:
    get:
      operationId: streamVoiceSample
      tags: [voice]
      summary: Stream a voice sample's audio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: WAV audio
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or not ready

  /people/{id}/voice/speak:
    post:
      operationId: createVoiceGeneration
      tags: [voice]
      summary: Synthesize arbitrary text in this person's cloned voice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceSpeakRequest"
      responses:
        "202":
          description: Generation queued
          content:
