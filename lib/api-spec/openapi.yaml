      operationId: createGraphicsGeneration
      tags: [graphics]
      summary: Queue an image or video generation on the local ComfyUI instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphicsGenerateInput"
      responses:
        "202":
          description: Queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphicsGeneration"
