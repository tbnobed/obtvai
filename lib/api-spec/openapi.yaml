      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphicsGeneration"
        "404":
          description: Not found
    delete:
      operationId: deleteGraphicsGeneration
      tags: [graphics]
      summary: Delete a generation and its output files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /graphics/generations/{id}/cancel:
    post:
      operationId: cancelGraphicsGeneration
      tags: [graphics]
