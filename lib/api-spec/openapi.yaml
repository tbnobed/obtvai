          description: Not found
        "409":
          description: Person has no face thumbnail to search with

  /people/{id}/photo:
    post:
      operationId: updatePersonPhoto
      tags: [people]
      summary: Replace this person's picture with an uploaded photo — a detected face is cropped, otherwise the whole image is used (voice-over talent); face matching signatures are not changed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PersonPhotoInput"
