components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Media ────────────────────────────────────────────────────────────────
    TranslateRequest:
      type: object
      required: [target_language]
      properties:
        target_language:
          type: string
          description: "ISO code: es | fr | de | pt | it | nl | ru | ja | ko | zh | ar | hi"

    DubRequest:
      type: object
      required: [target_language]
      properties:
        target_language:
          type: string
          description: "ISO code with MMS-TTS support: es | fr | de | pt | nl | ru | ko | ar | hi"
        use_cloned_voices:
          type: boolean
          default: false
          description: Speak each segment in the identified speaker's cloned voice when their voice profile is ready; falls back to the stock TTS voice otherwise

    SocialScore:
      type: object
      required: [platform, score]
      properties:
        platform:
          type: string
          description: "youtube | instagram | x | facebook | tiktok"
        score:
          type: number
          description: Predicted performance score, 0-100
        verdict:
          type: ["string", "null"]
          description: One-line performance verdict
        strengths:
          type: ["array", "null"]
          items:
            type: string
        weaknesses:
          type: ["array", "null"]
          items:
            type: string
        best_format:
          type: ["string", "null"]
          description: Recommended format/cut for this platform
        suggested_caption:
          type: ["string", "null"]
        hashtags:
          type: ["array", "null"]
          items:
            type: string

    MediaAsset:
      type: object
      required: [id, filename, status, created_at]
      properties:
        id:
          type: string
        filename:
          type: string
        original_path:
          type: ["string", "null"]
        proxy_path:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        duration_seconds:
          type: ["number", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        fps:
          type: ["number", "null"]
        codec:
          type: ["string", "null"]
        file_size_bytes:
          type: ["integer", "null"]
        status:
          type: string
          description: "pending | processing | ready | error"
        processing_stage:
          type: ["string", "null"]
          description: Current processing stage name
        processing_progress:
          type: ["number", "null"]
          description: 0-100 percent
        scene_count:
          type: ["integer", "null"]
        speaker_count:
          type: ["integer", "null"]
        highlight_url:
          type: ["string", "null"]
          description: Set when a generated highlight reel is available
        translated_languages:
          type: ["array", "null"]
          items:
            type: string
          description: ISO codes of languages the transcript has been translated into
        dubbed_languages:
          type: ["array", "null"]
          items:
            type: string
          description: ISO codes of languages with a generated dubbed audio track
        social_scores:
          type: ["array", "null"]
          description: Per-platform social media performance predictions
          items:
            $ref: "#/components/schemas/SocialScore"
        synopsis:
          type: ["string", "null"]
          description: AI-generated synopsis of the content
        creative:
          anyOf:
            - $ref: "#/components/schemas/CreativeAnalysis"
            - type: "null"
          description: Creative editor pass — story beats, clip suggestions, editorial notes
        key_moments:
          type: ["array", "null"]
          description: AI-detected key moments with timecodes
          items:
            $ref: "#/components/schemas/KeyMoment"
        topics:
          type: ["array", "null"]
          description: AI-extracted topic tags
          items:
            type: string
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]

    KeyMoment:
      type: object
      required: [time, title]
      properties:
        time:
          type: number
          description: Timecode in seconds
        title:
          type: string
        description:
          type: ["string", "null"]

    CreativeAnalysis:
      type: object
      required: [story_beats, clip_suggestions, editorial_notes]
      properties:
        logline:
          type: ["string", "null"]
          description: One-sentence editorial pitch for the piece
        story_beats:
          type: array
          items:
            $ref: "#/components/schemas/StoryBeat"
        clip_suggestions:
          type: array
          items:
            $ref: "#/components/schemas/ClipSuggestion"
        editorial_notes:
          type: array
          items:
            $ref: "#/components/schemas/EditorialNote"
        generated_at:
          type: ["string", "null"]

    StoryBeat:
      type: object
      required: [time, beat, title]
      properties:
        time:
          type: number
          description: Timecode in seconds
        beat:
          type: string
          description: "hook | setup | development | turn | climax | resolution"
        title:
          type: string
        description:
          type: ["string", "null"]
        emotion:
          type: ["string", "null"]
          description: Dominant emotional register of the beat

    ClipSuggestion:
      type: object
      required: [start, end, title, reason]
      properties:
        start:
          type: number
          description: In point in seconds
        end:
          type: number
          description: Out point in seconds
        title:
          type: string
        quote:
          type: ["string", "null"]
          description: The strongest line spoken in the clip
        reason:
          type: string
          description: Why an editor would pull this clip
        strength:
          type: ["integer", "null"]
          description: Editorial strength score 1-100
        platforms:
          type: ["array", "null"]
          items:
            type: string
          description: Platforms this clip suits best

    EditorialNote:
      type: object
      required: [category, note]
      properties:
        category:
          type: string
          description: "pacing | structure | cuts | broll | delivery | best_take"
        note:
          type: string

    MediaListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        total:
          type: integer

    MediaUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
        title:
          type: string

    MediaIngestInput:
      type: object
      required: [file_path]
      properties:
        file_path:
          type: string
          description: Absolute path to the source media file on the server
        title:
          type: string

    LibraryStats:
      type: object
      required: [total_assets, total_duration_seconds, status_counts, storage_bytes]
      properties:
        total_assets:
          type: integer
        total_duration_seconds:
          type: number
        status_counts:
          type: object
          additionalProperties:
            type: integer
        storage_bytes:
          type: integer
        recent_activity:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"

    Scene:
      type: object
      required: [id, media_id, start_time, end_time]
      properties:
        id:
          type: string
        media_id:
          type: string
        start_time:
          type: number
          description: Seconds
        end_time:
          type: number
          description: Seconds
        thumbnail_url:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        embedding_id:
          type: ["string", "null"]

    TranscriptSegment:
      type: object
      required: [id, media_id, start_time, end_time, text]
      properties:
        id:
          type: string
        media_id:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        text:
          type: string
        speaker:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]

    FaceCluster:
      type: object
      required: [cluster_id, media_id, appearances]
      properties:
        cluster_id:
          type: string
        media_id:
          type: string
        label:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        appearances:
          type: array
          items:
            type: object
            required: [start_time, end_time]
            properties:
              start_time:
                type: number
              end_time:
                type: number

    # ── People ────────────────────────────────────────────────────────────────
    Person:
      type: object
      required: [id, display_name, asset_count, total_speaking_seconds, segment_count]
      properties:
        id:
          type: string
        display_name:
          type: string
        name_source:
          type: ["string", "null"]
          description: "auto (LLM-extracted from transcripts) | manual | null (unnamed)"
        thumbnail_url:
          type: ["string", "null"]
        speech_style:
          type: ["string", "null"]
          description: AI summary of how this person speaks
        key_topics:
          type: array
          items:
            type: string
        summary:
          type: ["string", "null"]
          description: AI bio of who this person appears to be
        asset_count:
          type: integer
        total_speaking_seconds:
          type: number
        segment_count:
          type: integer
        updated_at:
          type: ["string", "null"]
        voice_preset:
          type: ["string", "null"]
          description: Saved synthesis style for this person's cloned voice
        voice_settings:
          allOf:
            - $ref: "#/components/schemas/VoiceSettings"
          description: Saved custom synthesis settings (take precedence over voice_preset)

    PersonAppearance:
      type: object
      required: [media_id, filename]
      properties:
        media_id:
          type: string
        filename:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        duration_seconds:
          type: ["number", "null"]
        speaker_label:
          type: ["string", "null"]
        face_cluster_id:
          type: ["string", "null"]
        speaking_seconds:
          type: ["number", "null"]
        segment_count:
          type: ["integer", "null"]
        first_spoken_at:
          type: ["number", "null"]
          description: Seconds into the asset where this person first speaks

    PersonDetail:
      allOf:
        - $ref: "#/components/schemas/Person"
        - type: object
          required: [appearances]
          properties:
            appearances:
              type: array
              items:
                $ref: "#/components/schemas/PersonAppearance"

    PersonUpdate:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          minLength: 1

    PersonMergeRequest:
      type: object
      required: [source_person_id]
      properties:
        source_person_id:
          type: string
          description: Person to merge into the target; the source is deleted

    PersonSplitRequest:
      type: object
      required: [media_id]
      properties:
        media_id:
          type: string
          description: Media asset of the appearance to split out
        speaker_label:
          type: string
          nullable: true
          description: Diarized speaker label of the appearance (when voice-based)
        face_cluster_id:
          type: string
          nullable: true
          description: Face cluster of the appearance (when face-based)

    PeoplePage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Person"
        total:
          type: integer
          description: Total number of people in the library

    # ── Voice cloning ─────────────────────────────────────────────────────────
    VoiceSample:
      type: object
      required: [id, person_id, source, status, created_at]
      properties:
        id:
          type: string
        person_id:
          type: string
        source:
          type: string
          description: "segment (cut from an indexed asset) | upload (user-provided file)"
        status:
          type: string
          description: "pending | ready | error"
        media_id:
          type: ["string", "null"]
          description: Source asset when the sample was cut from a segment
        filename:
          type: ["string", "null"]
          description: Source asset filename or original uploaded filename
        start_time:
          type: ["number", "null"]
        end_time:
          type: ["number", "null"]
        duration_seconds:
          type: ["number", "null"]
          description: Length of the normalized sample once ready
        error_message:
          type: ["string", "null"]
        created_at:
          type: string

    VoiceProfile:
      type: object
      required: [person_id, ready, total_sample_seconds, min_sample_seconds, samples]
      properties:
        person_id:
          type: string
        ready:
          type: boolean
          description: True when enough clean sample audio exists to clone the voice
        total_sample_seconds:
          type: number
          description: Total duration of ready samples
        min_sample_seconds:
          type: number
          description: Minimum sample audio required before cloning unlocks
        samples:
          type: array
          items:
            $ref: "#/components/schemas/VoiceSample"

    VoiceSampleFromSegment:
      type: object
      required: [media_id, start_time, end_time]
      properties:
        media_id:
          type: string
        start_time:
          type: number
          minimum: 0
        end_time:
          type: number
          description: Must be after start_time; segment capped at 60 seconds

    VoiceSampleUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: Audio file (wav, mp3, m4a, flac, ogg)

    VoiceSpeakRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
        language:
          type: string
          default: en
          description: "XTTS language code: en | es | fr | de | it | pt | pl | tr | ru | nl | cs | ar | zh-cn | ja | hu | ko | hi"
        settings:
          allOf:
            - $ref: "#/components/schemas/VoiceSettings"
          description: Optional per-generation synthesis overrides

    VoiceSettings:
      type: object
      description: XTTS synthesis knobs. Omitted/null fields fall back to stock defaults.
      properties:
        speed:
          type: ["number", "null"]
          description: Playback pace, 0.7-1.3 (1.0 = normal)
        temperature:
          type: ["number", "null"]
          description: Expressiveness/variation, 0.2-1.2 (higher = livelier, less stable)
        top_p:
          type: ["number", "null"]
          description: Stability, 0.3-1.0 (lower = safer, flatter)
        repetition_penalty:
          type: ["number", "null"]
          description: Clarity/anti-mumble, 1.5-12 (higher = crisper, can clip words)

    VoiceTuneRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 400
        language:
          type: string
          default: en

    VoicePresetRequest:
      type: object
      required: [preset]
      properties:
        preset:
          type: string
          description: "natural | expressive | steady | warm"

    VoiceGeneration:
      type: object
      required: [id, person_id, text, language, status, progress, created_at]
      properties:
        id:
          type: string
        person_id:
          type: string
        text:
          type: string
        language:
          type: string
        status:
          type: string
          description: "pending | running | success | error"
        progress:
          type: number
        duration_seconds:
          type: ["number", "null"]
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
        preset:
          type: ["string", "null"]
          description: Synthesis style this clip was generated with (tuning runs)
        settings:
          allOf:
            - $ref: "#/components/schemas/VoiceSettings"
          description: Custom synthesis settings this clip was generated with

    ReanalyzeResult:
      type: object
      required: [assets_queued, jobs_created]
      properties:
        assets_queued:
          type: integer
          description: Number of media assets queued for re-analysis
        jobs_created:
          type: integer
          description: Total diarize/face_detect jobs created

    # ── Insights ──────────────────────────────────────────────────────────────
    InsightItem:
      type: object
      required: [title, detail]
      properties:
        title:
          type: string
        detail:
          type: string

    TopPerson:
      type: object
      required: [person_id, display_name, asset_count, speaking_seconds]
      properties:
        person_id:
          type: string
        display_name:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        asset_count:
          type: integer
        speaking_seconds:
          type: number

    TopTopic:
      type: object
      required: [topic, asset_count]
      properties:
        topic:
          type: string
        asset_count:
          type: integer

    LibraryInsights:
      type: object
      required: [stats, top_people, top_topics, insights]
      properties:
        generated_at:
          type: ["string", "null"]
          description: When the AI narrative was last generated (null if never)
        headline:
          type: ["string", "null"]
        insights:
          type: array
          items:
            $ref: "#/components/schemas/InsightItem"
        stats:
          type: object
          required: [total_assets, total_duration_seconds, total_people, transcribed_assets, total_speaking_seconds]
          properties:
            total_assets:
              type: integer
            total_duration_seconds:
              type: number
            total_people:
              type: integer
            transcribed_assets:
              type: integer
            total_speaking_seconds:
              type: number
        top_people:
          type: array
          items:
            $ref: "#/components/schemas/TopPerson"
        top_topics:
          type: array
          items:
            $ref: "#/components/schemas/TopTopic"

    # ── Search ────────────────────────────────────────────────────────────────
    SearchQuery:
      type: object
      required: [query]
      properties:
        query:
          type: string
        media_id:
          type: ["string", "null"]
          description: Restrict search to a specific asset
        media_ids:
          type: ["array", "null"]
          items:
            type: string
          description: Restrict search to a set of assets (e.g. a project's media pool)
        search_type:
          type: string
          description: "transcript | visual | combined"
          default: combined
        limit:
          type: integer
          default: 20

    SearchResult:
      type: object
      required: [media_id, filename, start_time, end_time, score, match_type]
      properties:
        media_id:
          type: string
        filename:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        score:
          type: number
        match_type:
          type: string
          description: "transcript | visual"
        snippet:
          type: ["string", "null"]
          description: Matching transcript text

    SearchResponse:
      type: object
      required: [results, query, took_ms]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        query:
          type: string
        took_ms:
          type: number

    ScriptMatchRequest:
      type: object
      required: [script]
      properties:
        script:
          type: string
          minLength: 1
          description: Script, rundown, or story outline; matched line by line
        media_id:
          type: ["string", "null"]
          description: Restrict matching to one asset
        media_ids:
          type: ["array", "null"]
          items:
            type: string
          description: Restrict matching to a set of assets (e.g. a project's media pool)
        matches_per_line:
          type: integer
          default: 3
          minimum: 1
          maximum: 10

    ScriptMatchLine:
      type: object
      required: [line, matches]
      properties:
        line:
          type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"

    ScriptMatchResponse:
      type: object
      required: [lines, took_ms]
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ScriptMatchLine"
        took_ms:
          type: number

    SearchHistoryItem:
      type: object
      required: [id, query, result_count, searched_at]
      properties:
        id:
          type: string
        query:
          type: string
        result_count:
          type: integer
        searched_at:
          type: string

    # ── Jobs ─────────────────────────────────────────────────────────────────
    ProcessingJob:
      type: object
      required: [id, job_type, status, created_at]
      properties:
        id:
          type: string
        media_id:
          type: ["string", "null"]
          description: Null for library-wide jobs (e.g. insights)
        filename:
          type: ["string", "null"]
        job_type:
          type: string
          description: "ingest | proxy | audio_extract | transcribe | diarize | scene_detect | visual_embed | face_detect | index | analyze | translate | dub | identify | insights"
        status:
          type: string
          description: "pending | running | success | error | cancelled"
        progress:
          type: ["number", "null"]
          description: 0-100
        error_message:
          type: ["string", "null"]
        logs:
          type: array
          items:
            type: string
        retry_count:
          type: integer
        created_at:
          type: string
        started_at:
          type: ["string", "null"]
        finished_at:
          type: ["string", "null"]

    JobCleanupRequest:
      type: object
      properties:
        statuses:
          type: array
          description: "Finished statuses to delete. Defaults to all of: success, error, cancelled."
          items:
            type: string

    JobCleanupResult:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer

    ResumeStalledResult:
      type: object
      required: [assets_resumed, jobs_created, assets_marked_ready]
      properties:
        assets_resumed:
          type: integer
        jobs_created:
          type: integer
        assets_marked_ready:
          type: integer

    RetryFailedResult:
      type: object
      required: [retried]
      properties:
        retried:
          type: integer

    JobStageStats:
      type: object
      required: [job_type, pending, running, success, error]
      properties:
        job_type:
          type: string
        pending:
          type: integer
        running:
          type: integer
        success:
          type: integer
        error:
          type: integer

    JobStats:
      type: object
      required:
        [
          assets_total,
          assets_ready,
          assets_processing,
          assets_error,
          jobs_pending,
          jobs_running,
          jobs_error,
          stages,
        ]
      properties:
        assets_total:
          type: integer
        assets_ready:
          type: integer
        assets_processing:
          type: integer
        assets_error:
          type: integer
        jobs_pending:
          type: integer
        jobs_running:
          type: integer
        jobs_error:
          type: integer
        stages:
          type: array
          items:
            $ref: "#/components/schemas/JobStageStats"

    # ── AI ───────────────────────────────────────────────────────────────────
    AIQuestion:
      type: object
      required: [question]
      properties:
        question:
          type: string
        conversation_id:
          type: ["string", "null"]
        media_id:
          type: ["string", "null"]

    AICitation:
      type: object
      required: [media_id, filename, start_time, end_time]
      properties:
        media_id:
          type: string
        filename:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        snippet:
          type: ["string", "null"]

    AIAnswer:
      type: object
      required: [answer, conversation_id, citations]
      properties:
        answer:
          type: string
        conversation_id:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/AICitation"

    Conversation:
      type: object
      required: [id, created_at, message_count]
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        created_at:
          type: string
        message_count:
          type: integer

    AIMessage:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id:
          type: string
        conversation_id:
          type: string
        role:
          type: string
          description: "user | assistant"
        content:
          type: string
        citations:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/AICitation"
        created_at:
          type: string

    # ── Clips ─────────────────────────────────────────────────────────────────
    Clip:
      type: object
      required: [id, media_id, start_time, end_time]
      properties:
        id:
          type: string
        media_id:
          type: string
        filename:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        label:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # ── Projects ──────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, created_at, counts]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        script:
          type: ["string", "null"]
          description: Working script/rundown text used in the Find stage
        status:
          type: string
          enum: [active, archived]
          default: active
        media_ids:
          type: array
          items:
            type: string
          default: []
          description: Media pool — asset ids this project works with; empty means the whole library
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]
        counts:
          type: object
          required: [clip_lists, stories, reels, renders]
          properties:
            clip_lists:
              type: integer
            stories:
              type: integer
            reels:
              type: integer
            renders:
              type: integer

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        script:
          type: ["string", "null"]
        media_ids:
          type: ["array", "null"]
          items:
            type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        script:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, archived]
        media_ids:
          type: ["array", "null"]
          items:
            type: string

    ClipList:
      type: object
      required: [id, name, created_at, clips]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        created_at:
          type: string
        clips:
          type: array
          items:
            $ref: "#/components/schemas/Clip"

    ClipListInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        project_id:
          type: ["string", "null"]
        clips:
          type: array
          items:
            type: object
            required: [media_id, start_time, end_time]
            properties:
              media_id:
                type: string
              start_time:
                type: number
              end_time:
                type: number
              label:
                type: string

    ClipListUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        project_id:
          type: ["string", "null"]
        clips:
          type: array
          items:
            type: object
            required: [media_id, start_time, end_time]
            properties:
              media_id:
                type: string
              start_time:
                type: number
              end_time:
                type: number
              label:
                type: string

    # ── Renders & publishing ──────────────────────────────────────────────────
    RenderPresetInput:
      type: object
      properties:
        preset:
          type: string
          enum: [original, vertical]
          default: original
          description: original keeps source framing; vertical crops to 9:16 (1080x1920)
        burn_captions:
          type: boolean
          default: false
          description: Burn transcript captions into the video

    RenderRequest:
      type: object
      required: [media_id, start_time, end_time]
      properties:
        media_id:
          type: string
        start_time:
          type: number
          minimum: 0
        end_time:
          type: number
          minimum: 0
        label:
          type: ["string", "null"]
        clip_list_id:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        preset:
          type: string
          enum: [original, vertical]
          default: original
        burn_captions:
          type: boolean
          default: false

    RenderJob:
      type: object
      required: [id, media_id, start_time, end_time, preset, burn_captions, status, progress, created_at]
      properties:
        id:
          type: string
        media_id:
          type: string
        filename:
          type: ["string", "null"]
          description: Source asset filename
        clip_list_id:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        label:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        preset:
          type: string
          description: original | vertical
        burn_captions:
          type: boolean
        status:
          type: string
          description: pending | running | success | error
        progress:
          type: number
        output_url:
          type: ["string", "null"]
          description: Set when status is success
        error_message:
          type: ["string", "null"]
        publish_status:
          type: ["string", "null"]
          description: null | pending | running | success | error
        publish_url:
          type: ["string", "null"]
          description: Public URL after successful publish
        publish_error:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time

    PublishRequest:
      type: object
      required: [title]
      properties:
        platform:
          type: string
          enum: [youtube]
          default: youtube
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
          default: []
        privacy:
          type: string
          enum: [public, unlisted, private]
          default: unlisted

    PublishPlatforms:
      type: object
      required: [youtube]
      properties:
        youtube:
          type: boolean
          description: True when YouTube credentials are configured on the server

    # ── Reels ─────────────────────────────────────────────────────────────────
    ReelRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 3
          description: 'What to highlight, e.g. "the fact about faith"'
        media_id:
          type: ["string", "null"]
          description: Restrict the reel to one asset, or null/omitted for the whole library
        media_ids:
          type: ["array", "null"]
          items:
            type: string
          description: Restrict the reel to a set of assets (e.g. a project's media pool)
        project_id:
          type: ["string", "null"]
        target_duration_seconds:
          type: ["number", "null"]
          minimum: 30
          maximum: 14400
          description: Desired run time in seconds; the builder selects enough material to reach it (up to 4 hours)
        preset:
          type: string
          enum: [original, vertical]
          default: original
        burn_captions:
          type: boolean
          default: false
        max_clips:
          type: integer
          default: 6
          minimum: 1
          maximum: 500
          description: Clip cap when no target duration is given

    ReelClip:
      type: object
      required: [media_id, filename, start_time, end_time]
      properties:
        media_id:
          type: string
        filename:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        snippet:
          type: ["string", "null"]
          description: Transcript text that matched the prompt
        thumbnail_url:
          type: ["string", "null"]
          description: Preview frame near the clip start (relative thumbnail path)

    ReelJob:
      type: object
      required: [id, prompt, preset, burn_captions, clips, status, progress, created_at]
      properties:
        id:
          type: string
        prompt:
          type: string
        media_id:
          type: ["string", "null"]
          description: Set when the reel is scoped to one asset
        project_id:
          type: ["string", "null"]
        target_duration_seconds:
          type: ["number", "null"]
          description: Requested run time in seconds, when one was given
        preset:
          type: string
          description: original | vertical
        burn_captions:
          type: boolean
        clips:
          type: array
          items:
            $ref: "#/components/schemas/ReelClip"
        status:
          type: string
          description: pending | running | success | error
        progress:
          type: number
        output_url:
          type: ["string", "null"]
          description: Set when status is success
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time

    SocialCutsRequest:
      type: object
      properties:
        platform:
          type: ["string", "null"]
          enum: [youtube, instagram, x, facebook, tiktok, null]
          description: Cut for one platform, or null/omitted for all scored platforms

    ClipExportInput:
      type: object
      required: [format]
      properties:
        format:
          type: string
          description: "edl | csv | json | fcpxml | otio"

    TightenInput:
      type: object
      properties:
        silence_threshold:
          type: number
          description: Minimum gap between speech segments (seconds) to cut, default 1.25
        remove_fillers:
          type: boolean
          description: Also cut segments that are only filler words, default true

    TightenCut:
      type: object
      required: [start, end, reason]
      properties:
        start:
          type: number
        end:
          type: number
        reason:
          type: string
          description: "silence | filler"

    TightenResult:
      type: object
      required: [media_id, clip_list_id, kept_segments, cuts, removed_seconds, original_duration]
      properties:
        media_id:
          type: string
        clip_list_id:
          type: string
          description: Clip list containing the kept segments, ready for export or rough cut
        kept_segments:
          type: integer
        cuts:
          type: array
          items:
            $ref: "#/components/schemas/TightenCut"
        removed_seconds:
          type: number
        original_duration:
          type: number

    RoughCutInput:
      type: object
      properties:
        preset:
          type: string
          description: "original | vertical, default original"
        burn_captions:
          type: boolean
          description: Burn subtitles into the video, default false

    StoryRequestIn:
      type: object
      required: [asset_ids]
      properties:
        asset_ids:
          type: array
          items:
            type: string
          minItems: 1
        prompt:
          type: ["string", "null"]
          description: Optional editorial direction for the storyline
        project_id:
          type: ["string", "null"]

    StoryJob:
      type: object
      required: [id, asset_ids, status, progress, created_at]
      properties:
        id:
          type: string
        prompt:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        asset_ids:
          type: array
          items:
            type: string
        status:
          type: string
          description: "pending | running | success | error"
        progress:
          type: number
        title:
          type: ["string", "null"]
        narrative:
          type: ["string", "null"]
        clip_list_id:
          type: ["string", "null"]
          description: Clip list with the ordered cross-asset clips
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
        finished_at:
          type: ["string", "null"]

    ClipExportResult:
      type: object
      required: [format, content]
      properties:
        format:
          type: string
        content:
          type: string
        filename:
          type: string
