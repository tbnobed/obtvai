          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoicePresetRequest"
      responses:
        "204":
          description: Saved
        "400":
          description: Unknown preset
        "404":
          description: Person not found

  /people/{id}/voice/settings:
    put:
      operationId: setVoiceSettings
      tags: [voice]
      summary: Save custom synthesis settings used for all future speech and dubbing in this person's voice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceSettings"
      responses:
        "204":
          description: Saved
        "400":
          description: Value out of range
        "404":
          description: Person not found

  /people/{id}/voice/generations:
    get:
      operationId: listVoiceGenerations
      tags: [voice]
      summary: List this person's speech generations, newest first
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoiceGeneration"

  /voice/generations/{id}:
    delete:
