        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Output file
          content:
            image/png:
              schema:
                type: string
                format: binary
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or not finished

  /graphics/generations/{id}/thumbnail:
    get:
      operationId: getGraphicsThumbnail
      tags: [graphics]
