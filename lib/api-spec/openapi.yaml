            application/json:
              schema:
                $ref: "#/components/schemas/ClipList"
    delete:
      operationId: deleteClipList
      tags: [clips]
      summary: Delete a clip list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /clips/{id}/export:
    post:
      operationId: exportClipList
      tags: [clips]
      summary: Export a clip list (EDL/CSV/JSON/FCPXML/OTIO)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClipExportInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipExportResult"

  /clips/{id}/roughcut:
    post:
      operationId: createClipListRoughCut
      tags: [clips]
      summary: Stitch every clip in a clip list into one rough cut video
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoughCutInput"
      responses:
        "202":
          description: Rough cut job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReelJob"
        "409":
          description: Clip list is empty

  /clips/{id}/render:
    post:
      operationId: renderClipList
      tags: [renders]
      summary: Render every clip in a clip list to MP4 files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderPresetInput"
      responses:
        "202":
          description: Render jobs queued
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RenderJob"
        "404":
          description: Not found

  # ── Renders ────────────────────────────────────────────────────────────────
  /renders:
    get:
      operationId: listRenders
      tags: [renders]
      summary: List render jobs, newest first
      parameters:
        - name: clip_list_id
          in: query
          required: false
          schema:
            type: string
        - name: media_id
          in: query
          required: false
          description: Only renders of this asset
          schema:
            type: string
        - name: project_id
          in: query
          required: false
          description: Only renders linked to this project
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RenderJob"
    post:
      operationId: createRender
      tags: [renders]
      summary: Render a single clip to an MP4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderRequest"
      responses:
        "202":
          description: Render job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "404":
          description: Media not found

  /renders/{id}:
    get:
      operationId: getRender
      tags: [renders]
      summary: Get a render job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "404":
          description: Not found
    delete:
      operationId: deleteRender
      tags: [renders]
      summary: Delete a render job and its output file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /renders/{id}/download:
    get:
      operationId: downloadRender
      tags: [renders]
      summary: Download the rendered MP4
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MP4 file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or not finished

  /renders/{id}/publish:
    post:
      operationId: publishRender
      tags: [renders]
      summary: Publish a finished render to a third-party platform (YouTube)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "202":
          description: Publish queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "400":
          description: Platform not configured or render not finished
        "404":
          description: Not found

  /renders/publish/platforms:
    get:
      operationId: getPublishPlatforms
      tags: [renders]
      summary: Which publish platforms are configured
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishPlatforms"

  # ── Reels ──────────────────────────────────────────────────────────────────
  /reels:
    get:
      operationId: listReels
      tags: [reels]
      summary: List prompt-based highlight reels, newest first
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
        - name: media_id
          in: query
          required: false
          description: Only reels scoped to this asset
          schema:
            type: string
        - name: project_id
          in: query
          required: false
          description: Only reels linked to this project
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReelJob"
    post:
      operationId: createReel
      tags: [reels]
      summary: Build a highlight reel across the library from a prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReelRequest"
      responses:
        "202":
          description: Reel job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReelJob"
        "404":
          description: No matching moments found for the prompt

  /reels/{id}:
    get:
      operationId: getReel
      tags: [reels]
      summary: Get a reel job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReelJob"
        "404":
          description: Not found
    delete:
      operationId: deleteReel
      tags: [reels]
      summary: Delete a reel job and its output file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /reels/{id}/download:
    get:
      operationId: downloadReel
      tags: [reels]
      summary: Download the finished reel MP4
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: MP4 file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: Not found or not finished

  # ── Stories ────────────────────────────────────────────────────────────────
  /stories:
    get:
      operationId: listStories
      tags: [stories]
      summary: List multi-video story builder jobs, newest first
      parameters:
        - name: project_id
          in: query
          required: false
          description: Only stories linked to this project
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoryJob"
    post:
      operationId: createStory
      tags: [stories]
      summary: Build one storyline across several assets (LLM creative pass)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryRequestIn"
      responses:
        "202":
          description: Story job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryJob"

  /stories/{id}:
    get:
      operationId: getStory
      tags: [stories]
      summary: Get a story job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryJob"
        "404":
          description: Not found
    delete:
      operationId: deleteStory
      tags: [stories]
      summary: Delete a story job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /search/script-match:
    post:
      operationId: scriptMatch
      tags: [search]
      summary: Match each line of a script or rundown to moments in the library
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptMatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptMatchResponse"

  # ── Auth ───────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password; sets the session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUser"
        "401":
          description: Invalid credentials or account disabled

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and invalidate the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionUser"
        "401":
          description: Not authenticated

  /auth/password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change own password (invalidates all other sessions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeInput"
      responses:
        "204":
          description: Password changed
        "400":
          description: New password rejected
        "401":
          description: Current password incorrect

  # ── Users (admin) ──────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserOut"
        "403":
          description: Admin only
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOut"
        "400":
          description: Invalid input
        "403":
          description: Admin only
        "409":
          description: Username already exists

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user's role, display name, disabled flag, or reset their password (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOut"
        "400":
          description: Invalid input (e.g. demoting or disabling the last admin)
        "403":
          description: Admin only
        "404":
          description: Not found
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only; cannot delete the last admin or yourself)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "400":
          description: Cannot delete the last admin or your own account
        "403":
          description: Admin only
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Media ────────────────────────────────────────────────────────────────
    TranslateRequest:
      type: object
      required: [target_language]
      properties:
        target_language:
          type: string
          description: "ISO code: es | fr | de | pt | it | nl | ru | ja | ko | zh | ar | hi"

    DubRequest:
      type: object
      required: [target_language]
      properties:
        target_language:
          type: string
          description: "ISO code with MMS-TTS support: es | fr | de | pt | nl | ru | ko | ar | hi"
        use_cloned_voices:
          type: boolean
          default: false
          description: Speak each segment in the identified speaker's cloned voice when their voice profile is ready; falls back to the stock TTS voice otherwise
        lip_sync:
          type: boolean
          default: false
          description: Re-render mouth movement to match the dubbed audio (Wav2Lip) inside dubbed speech windows; frames without a confident frontal face are left untouched. Falls back to the audio-only dub on failure.

    SocialScore:
      type: object
      required: [platform, score]
      properties:
        platform:
          type: string
          description: "youtube | instagram | x | facebook | tiktok"
        score:
          type: number
          description: Predicted performance score, 0-100
        verdict:
          type: ["string", "null"]
          description: One-line performance verdict
        strengths:
          type: ["array", "null"]
          items:
            type: string
        weaknesses:
          type: ["array", "null"]
          items:
            type: string
        best_format:
          type: ["string", "null"]
          description: Recommended format/cut for this platform
        suggested_caption:
          type: ["string", "null"]
        hashtags:
          type: ["array", "null"]
          items:
            type: string

    MediaAsset:
      type: object
      required: [id, filename, status, created_at]
      properties:
        id:
          type: string
        filename:
          type: string
        original_path:
          type: ["string", "null"]
        proxy_path:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        duration_seconds:
          type: ["number", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        fps:
          type: ["number", "null"]
        codec:
          type: ["string", "null"]
        file_size_bytes:
          type: ["integer", "null"]
        status:
          type: string
          description: "pending | processing | ready | error"
        processing_stage:
          type: ["string", "null"]
          description: Current processing stage name
        processing_progress:
          type: ["number", "null"]
          description: 0-100 percent
        scene_count:
          type: ["integer", "null"]
        speaker_count:
          type: ["integer", "null"]
        highlight_url:
          type: ["string", "null"]
          description: Set when a generated highlight reel is available
        translated_languages:
          type: ["array", "null"]
          items:
            type: string
          description: ISO codes of languages the transcript has been translated into
        dubbed_languages:
          type: ["array", "null"]
          items:
            type: string
          description: ISO codes of languages with a generated dubbed audio track
        social_scores:
          type: ["array", "null"]
          description: Per-platform social media performance predictions
          items:
            $ref: "#/components/schemas/SocialScore"
        synopsis:
          type: ["string", "null"]
          description: AI-generated synopsis of the content
        creative:
          anyOf:
            - $ref: "#/components/schemas/CreativeAnalysis"
            - type: "null"
          description: Creative editor pass — story beats, clip suggestions, editorial notes
        qc_flags:
          type: ["object", "null"]
          description: Technical QC results (audio clipping, silence, black frames)
          additionalProperties: true
        key_moments:
          type: ["array", "null"]
          description: AI-detected key moments with timecodes
          items:
            $ref: "#/components/schemas/KeyMoment"
        topics:
          type: ["array", "null"]
          description: AI-extracted topic tags
          items:
            type: string
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]

    Marker:
      type: object
      required: [id, media_id, time, kind, source, created_at]
      properties:
        id:
          type: string
        media_id:
          type: string
        time:
          type: number
        end_time:
          type: ["number", "null"]
        kind:
          type: string
          enum: [select, reject, marker]
        note:
          type: ["string", "null"]
        source:
          type: string
          enum: [editor, ai]
        created_at:
          type: string

    MarkerInput:
      type: object
      required: [time]
      properties:
        time:
          type: number
        end_time:
          type: ["number", "null"]
        kind:
          type: string
          enum: [select, reject, marker]
          default: marker
        note:
          type: string

    KeyMoment:
      type: object
      required: [time, title]
      properties:
        time:
          type: number
          description: Timecode in seconds
        title:
          type: string
        description:
          type: ["string", "null"]

    CreativeAnalysis:
      type: object
      required: [story_beats, clip_suggestions, editorial_notes]
      properties:
        logline:
          type: ["string", "null"]
          description: One-sentence editorial pitch for the piece
        story_beats:
          type: array
          items:
            $ref: "#/components/schemas/StoryBeat"
        clip_suggestions:
          type: array
          items:
            $ref: "#/components/schemas/ClipSuggestion"
        editorial_notes:
          type: array
          items:
            $ref: "#/components/schemas/EditorialNote"
        generated_at:
          type: ["string", "null"]

    StoryBeat:
      type: object
      required: [time, beat, title]
      properties:
        time:
          type: number
          description: Timecode in seconds
        beat:
          type: string
          description: "hook | setup | development | turn | climax | resolution"
        title:
          type: string
        description:
          type: ["string", "null"]
        emotion:
          type: ["string", "null"]
          description: Dominant emotional register of the beat

    ClipSuggestion:
      type: object
      required: [start, end, title, reason]
      properties:
        start:
          type: number
          description: In point in seconds
        end:
          type: number
          description: Out point in seconds
        title:
          type: string
        quote:
          type: ["string", "null"]
          description: The strongest line spoken in the clip
        reason:
          type: string
          description: Why an editor would pull this clip
        strength:
          type: ["integer", "null"]
          description: Editorial strength score 1-100
        platforms:
          type: ["array", "null"]
          items:
            type: string
          description: Platforms this clip suits best

    EditorialNote:
      type: object
      required: [category, note]
      properties:
        category:
          type: string
          description: "pacing | structure | cuts | broll | delivery | best_take"
        note:
          type: string

    MediaListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        total:
          type: integer

    MediaUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
        title:
          type: string

    MediaIngestInput:
      type: object
      required: [file_path]
      properties:
        file_path:
          type: string
          description: Absolute path to the source media file on the server
        title:
          type: string

    MediaLinkImportInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Shared link to a video file or folder (Dropbox links are handled automatically; folder links download as a zip and every video inside is imported)
        title:
          type: string

    LibraryStats:
      type: object
      required: [total_assets, total_duration_seconds, speech_indexed_seconds, status_counts, storage_bytes]
      properties:
        total_assets:
          type: integer
        total_duration_seconds:
          type: number
        speech_indexed_seconds:
          type: number
          description: Total duration of assets that have a transcript (searchable footage)
        status_counts:
          type: object
          additionalProperties:
            type: integer
        storage_bytes:
          type: integer
        recent_activity:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"

    Scene:
      type: object
      required: [id, media_id, start_time, end_time]
      properties:
        id:
          type: string
        media_id:
          type: string
        start_time:
          type: number
          description: Seconds
        end_time:
          type: number
          description: Seconds
        thumbnail_url:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        embedding_id:
          type: ["string", "null"]

    TranscriptSegment:
      type: object
      required: [id, media_id, start_time, end_time, text]
      properties:
        id:
          type: string
        media_id:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        text:
          type: string
        speaker:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]

    TranscriptSegmentUpdate:
      type: object
      required: [text]
      properties:
        text:
          type: string
        lang:
          type: ["string", "null"]
          description: ISO code of the translation to edit; null/omitted edits the original transcript text

    FaceCluster:
      type: object
      required: [cluster_id, media_id, appearances]
      properties:
        cluster_id:
          type: string
        media_id:
          type: string
        label:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        appearances:
          type: array
          items:
            type: object
            required: [start_time, end_time]
            properties:
              start_time:
                type: number
              end_time:
                type: number

    # ── People ────────────────────────────────────────────────────────────────
    Person:
      type: object
      required: [id, display_name, asset_count, total_speaking_seconds, segment_count]
      properties:
        id:
          type: string
        display_name:
          type: string
        name_source:
          type: ["string", "null"]
          description: "auto (LLM-extracted from transcripts) | manual | null (unnamed)"
        thumbnail_url:
          type: ["string", "null"]
        speech_style:
          type: ["string", "null"]
          description: AI summary of how this person speaks
        key_topics:
          type: array
          items:
            type: string
        summary:
          type: ["string", "null"]
          description: AI bio of who this person appears to be
        asset_count:
          type: integer
        total_speaking_seconds:
          type: number
        segment_count:
          type: integer
        updated_at:
          type: ["string", "null"]
        voice_preset:
          type: ["string", "null"]
          description: Saved synthesis style for this person's cloned voice
        voice_settings:
          allOf:
            - $ref: "#/components/schemas/VoiceSettings"
          description: Saved custom synthesis settings (take precedence over voice_preset)
        face_search:
          oneOf:
            - $ref: "#/components/schemas/FaceSearchResult"
            - type: "null"
          description: Latest web face-search state/results for this person

    FaceSearchCandidate:
      type: object
      required: [title, link]
      properties:
        title:
          type: string
        link:
          type: string
        source:
          type: ["string", "null"]
          description: Site the match was found on
        thumbnail:
          type: ["string", "null"]
          description: External thumbnail URL of the matched image

    FaceSearchResult:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, done, error]
        queued_at:
          type: ["string", "null"]
          description: When the search was queued — lets the UI treat a long-stuck pending state as retryable
        searched_at:
          type: ["string", "null"]
        error:
          type: ["string", "null"]
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/FaceSearchCandidate"

    PersonAppearance:
      type: object
      required: [media_id, filename]
      properties:
        media_id:
          type: string
        filename:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        duration_seconds:
          type: ["number", "null"]
        speaker_label:
          type: ["string", "null"]
        face_cluster_id:
          type: ["string", "null"]
        speaking_seconds:
          type: ["number", "null"]
        segment_count:
          type: ["integer", "null"]
        first_spoken_at:
          type: ["number", "null"]
          description: Seconds into the asset where this person first speaks
        merged_from:
          type: ["object", "null"]
          description: Set when this appearance arrived via a person merge — records who it originally belonged to so the merge can be undone
          required: [person_id, display_name]
          properties:
            person_id:
              type: string
              description: Id of the original person (deleted by the merge)
            display_name:
              type: string
              description: Display name the original person had at merge time

    PersonDetail:
      allOf:
        - $ref: "#/components/schemas/Person"
        - type: object
          required: [appearances]
          properties:
            appearances:
              type: array
              items:
                $ref: "#/components/schemas/PersonAppearance"

    SpeakingMoment:
      type: object
      required: [start_time, end_time, text]
      properties:
        start_time:
          type: number
        end_time:
          type: number
        text:
          type: string

    OnCameraRange:
      type: object
      required: [start_time, end_time]
      properties:
        start_time:
          type: number
        end_time:
          type: number

    PersonAssetMoments:
      type: object
      required: [media_id, speaking, on_camera]
      properties:
        media_id:
          type: string
        speaking:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingMoment"
          description: Each transcript segment where this person speaks, in timecode order
        on_camera:
          type: array
          items:
            $ref: "#/components/schemas/OnCameraRange"
          description: Face-detection time ranges where this person is visible on screen

    PersonEnrollInput:
      type: object
      required: [photo, display_name]
      properties:
        photo:
          type: string
          format: binary
        display_name:
          type: string

    PersonPhotoInput:
      type: object
      required: [photo]
      properties:
        photo:
          type: string
          format: binary

    PersonMatch:
      type: object
      required: [person_id, display_name, asset_count, similarity, strong]
      properties:
        person_id:
          type: string
        display_name:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        asset_count:
          type: integer
        similarity:
          type: number
          description: Cosine similarity between the uploaded photo's face and this person's stored face signature (0-1)
        strong:
          type: boolean
          description: Likely the same person — safe to preselect for merging

    PersonEnrollResult:
      type: object
      required: [person, matches]
      properties:
        person:
          $ref: "#/components/schemas/Person"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/PersonMatch"
          description: Existing people whose face signature resembles the photo, best first

    CoAppearanceNode:
      type: object
      required: [person_id, display_name, asset_count]
      properties:
        person_id:
          type: string
        display_name:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        asset_count:
          type: integer

    CoAppearancePair:
      type: object
      required: [person_a_id, person_b_id, shared_assets, together_seconds]
      properties:
        person_a_id:
          type: string
        person_b_id:
          type: string
        shared_assets:
          type: integer
          description: Number of assets both people appear in
        together_seconds:
          type: number
          description: Seconds both people are on camera at the same time across shared assets (0 when face timing data is missing)

    CoAppearanceGraph:
      type: object
      required: [nodes, pairs]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/CoAppearanceNode"
          description: People that share at least one asset with someone else
        pairs:
          type: array
          items:
            $ref: "#/components/schemas/CoAppearancePair"

    AssetPerson:
      type: object
      required: [person_id, display_name, speaking, on_camera]
      properties:
        person_id:
          type: string
        display_name:
          type: string
        thumbnail_url:
          type: ["string", "null"]
          description: Face thumbnail — the person's library thumbnail (same picture as the People pages), else the face-cluster crop from this asset
        speaker_label:
          type: ["string", "null"]
        speaking_seconds:
          type: ["number", "null"]
        speaking:
          type: array
          items:
            $ref: "#/components/schemas/SpeakingMoment"
          description: Transcript segments where this person speaks, in timecode order
        on_camera:
          type: array
          items:
            $ref: "#/components/schemas/OnCameraRange"
          description: Time ranges where this person is visible on screen

    PersonUpdate:
      type: object
      minProperties: 1
      properties:
        display_name:
          type: string
          minLength: 1
        summary:
          type: string
          maxLength: 2000
          description: Manually edited bio — overwrites the AI-generated profile text

    ReprofileRequest:
      type: object
      properties:
        use_web:
          type: boolean
          default: false
          description: Enrich the profile with a self-hosted SearXNG web search for the person's name

    PersonMergeRequest:
      type: object
      required: [source_person_id]
      properties:
        source_person_id:
          type: string
          description: Person to merge into the target; the source is deleted

    PersonSplitRequest:
      type: object
      required: [media_id]
      properties:
        media_id:
          type: string
          description: Media asset of the appearance to split out
        speaker_label:
          type: string
          nullable: true
          description: Diarized speaker label of the appearance (when voice-based)
        face_cluster_id:
          type: string
          nullable: true
          description: Face cluster of the appearance (when face-based)

    PersonUnmergeRequest:
      type: object
      required: [merged_from_person_id]
      properties:
        merged_from_person_id:
          type: string
          description: Original id of the merged-in person whose appearances should be pulled back out (from PersonAppearance.merged_from)

    PeoplePage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Person"
        total:
          type: integer
          description: Total number of people in the library

    # ── Voice cloning ─────────────────────────────────────────────────────────
    VoiceSample:
      type: object
      required: [id, person_id, source, status, created_at]
      properties:
        id:
          type: string
        person_id:
          type: string
        source:
          type: string
          description: "segment (cut from an indexed asset) | upload (user-provided file)"
        status:
          type: string
          description: "pending | ready | error"
        media_id:
          type: ["string", "null"]
          description: Source asset when the sample was cut from a segment
        filename:
          type: ["string", "null"]
          description: Source asset filename or original uploaded filename
        start_time:
          type: ["number", "null"]
        end_time:
          type: ["number", "null"]
        duration_seconds:
          type: ["number", "null"]
          description: Length of the normalized sample once ready
        error_message:
          type: ["string", "null"]
        created_at:
          type: string

    VoiceProfile:
      type: object
      required: [person_id, ready, total_sample_seconds, min_sample_seconds, samples]
      properties:
        person_id:
          type: string
        ready:
          type: boolean
          description: True when enough clean sample audio exists to clone the voice
        total_sample_seconds:
          type: number
          description: Total duration of ready samples
        min_sample_seconds:
          type: number
          description: Minimum sample audio required before cloning unlocks
        samples:
          type: array
          items:
            $ref: "#/components/schemas/VoiceSample"

    VoiceSampleFromSegment:
      type: object
      required: [media_id, start_time, end_time]
      properties:
        media_id:
          type: string
        start_time:
          type: number
          minimum: 0
        end_time:
          type: number
          description: Must be after start_time; segment capped at 60 seconds

    VoiceSampleUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: Audio file (wav, mp3, m4a, flac, ogg)

    VoiceSpeakRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
        language:
          type: string
          default: en
          description: "XTTS language code: en | es | fr | de | it | pt | pl | tr | ru | nl | cs | ar | zh-cn | ja | hu | ko | hi"
        settings:
          allOf:
            - $ref: "#/components/schemas/VoiceSettings"
          description: Optional per-generation synthesis overrides

    VoiceSettings:
      type: object
      description: XTTS synthesis knobs. Omitted/null fields fall back to stock defaults.
      properties:
        speed:
          type: ["number", "null"]
          description: Playback pace, 0.7-1.3 (1.0 = normal)
        temperature:
          type: ["number", "null"]
          description: Expressiveness/variation, 0.2-1.2 (higher = livelier, less stable)
        top_p:
          type: ["number", "null"]
          description: Stability, 0.3-1.0 (lower = safer, flatter)
        repetition_penalty:
          type: ["number", "null"]
          description: Clarity/anti-mumble, 1.5-12 (higher = crisper, can clip words)

    VoiceTuneRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 400
        language:
          type: string
          default: en

    VoicePresetRequest:
      type: object
      required: [preset]
      properties:
        preset:
          type: string
          description: "natural | expressive | steady | warm"

    VoiceGeneration:
      type: object
      required: [id, person_id, text, language, status, progress, created_at]
      properties:
        id:
          type: string
        person_id:
          type: string
        text:
          type: string
        language:
          type: string
        status:
          type: string
          description: "pending | running | success | error"
        progress:
          type: number
        duration_seconds:
          type: ["number", "null"]
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
        preset:
          type: ["string", "null"]
          description: Synthesis style this clip was generated with (tuning runs)
        settings:
          allOf:
            - $ref: "#/components/schemas/VoiceSettings"
          description: Custom synthesis settings this clip was generated with

    GraphicsPreset:
      type: object
      required: [id, name, kind, source, available]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        kind:
          type: string
          description: "image | video"
        source:
          type: string
          description: "builtin | custom (user-dropped ComfyUI API-format workflow)"
        available:
          type: boolean
          description: False when ComfyUI is unreachable or required nodes/models are missing
        unavailable_reason:
          type: ["string", "null"]
        supports_negative:
          type: boolean
          default: false
        supports_size:
          type: boolean
          default: false
        supports_steps:
          type: boolean
          default: false
        supports_frames:
          type: boolean
          default: false
        supports_seed:
          type: boolean
          default: false
        default_width:
          type: ["integer", "null"]
        default_height:
          type: ["integer", "null"]
        default_steps:
          type: ["integer", "null"]
        default_frames:
          type: ["integer", "null"]

    GraphicsGenerateInput:
      type: object
      required: [preset_id, prompt]
      properties:
        preset_id:
          type: string
        prompt:
          type: string
        negative:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        steps:
          type: ["integer", "null"]
        frames:
          type: ["integer", "null"]
          description: Video length in frames (video presets only)
        seed:
          type: ["integer", "null"]
          description: Omit or null for a random seed

    GraphicsGeneration:
      type: object
      required: [id, kind, preset_id, prompt, status, progress, created_at]
      properties:
        id:
          type: string
        kind:
          type: string
          description: "image | video"
        preset_id:
          type: string
        preset_name:
          type: ["string", "null"]
        prompt:
          type: string
        negative:
          type: ["string", "null"]
        status:
          type: string
          description: "pending | queued | running | success | error | cancelled"
        progress:
          type: number
        queue_position:
          type: ["integer", "null"]
          description: Position in the ComfyUI queue while waiting
        error_message:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        frames:
          type: ["integer", "null"]
        seed:
          type: ["integer", "null"]
          description: The actual seed used (filled in once running)
        duration_seconds:
          type: ["number", "null"]
          description: Output video duration (videos only)
        output_url:
          type: ["string", "null"]
          description: Stream URL once finished
        thumbnail_url:
          type: ["string", "null"]
        media_id:
          type: ["string", "null"]
          description: Library asset id after add-to-library
        created_at:
          type: string
        completed_at:
          type: ["string", "null"]

    GraphicsGenerationListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GraphicsGeneration"
        total:
          type: integer

    ReanalyzeResult:
      type: object
      required: [assets_queued, jobs_created]
      properties:
        assets_queued:
          type: integer
          description: Number of media assets queued for re-analysis
        jobs_created:
          type: integer
          description: Total diarize/face_detect jobs created

    # ── Insights ──────────────────────────────────────────────────────────────
    InsightPersonRef:
      type: object
      required: [display_name]
      properties:
        person_id:
          type: ["string", "null"]
          description: Null when the name could not be matched to a person record
        display_name:
          type: string

    InsightTopicRef:
      type: object
      required: [key, label]
      properties:
        key:
          type: string
          description: Normalized topic key for filtering
        label:
          type: string
          description: Human-readable topic label

    InsightItem:
      type: object
      required: [title, detail]
      properties:
        title:
          type: string
        detail:
          type: string
        related_people:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/InsightPersonRef"
        related_topics:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/InsightTopicRef"

    StoryOpportunity:
      type: object
      required: [title, rationale, asset_ids, people, total_duration_seconds]
      properties:
        title:
          type: string
          description: The story angle
        rationale:
          type: string
        asset_ids:
          type: array
          items:
            type: string
          description: Assets that support this story
        people:
          type: array
          items:
            $ref: "#/components/schemas/InsightPersonRef"
        total_duration_seconds:
          type: number
          description: Combined duration of the supporting assets

    CoverageGap:
      type: object
      required: [key, label, asset_count]
      properties:
        key:
          type: string
          description: Normalized topic key for filtering
        label:
          type: string
        asset_count:
          type: integer
          description: How many assets currently touch this topic

    TopPerson:
      type: object
      required: [person_id, display_name, asset_count, speaking_seconds]
      properties:
        person_id:
          type: string
        display_name:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        asset_count:
          type: integer
        speaking_seconds:
          type: number

    TopTopic:
      type: object
      required: [key, topic, asset_count]
      properties:
        key:
          type: string
          description: Normalized topic key for filtering (lowercase, separators collapsed)
        topic:
          type: string
          description: Human-readable topic label
        asset_count:
          type: integer

    KeywordHeatmapRow:
      type: object
      required: [key, label, total, counts]
      properties:
        key:
          type: string
          description: Normalized topic key for filtering
        label:
          type: string
          description: Human-readable topic label
        total:
          type: integer
          description: Total assets touching this keyword inside the window
        counts:
          type: array
          items:
            type: integer
          description: Asset counts aligned index-for-index with the months axis

    KeywordHeatmap:
      type: object
      required: [months, rows]
      properties:
        months:
          type: array
          items:
            type: string
          description: "Month buckets (YYYY-MM), oldest first"
        rows:
          type: array
          items:
            $ref: "#/components/schemas/KeywordHeatmapRow"
          description: Keyword rows sorted by total, busiest first

    LibraryInsights:
      type: object
      required: [stats, top_people, top_topics, insights, opportunities, coverage_gaps]
      properties:
        generated_at:
          type: ["string", "null"]
          description: When the AI narrative was last generated (null if never)
        headline:
          type: ["string", "null"]
        insights:
          type: array
          items:
            $ref: "#/components/schemas/InsightItem"
        opportunities:
          type: array
          items:
            $ref: "#/components/schemas/StoryOpportunity"
        coverage_gaps:
          type: array
          items:
            $ref: "#/components/schemas/CoverageGap"
        stats:
          type: object
          required: [total_assets, total_duration_seconds, speech_indexed_seconds, total_people, named_people_count, unidentified_people_count, transcribed_assets, total_speaking_seconds]
          properties:
            total_assets:
              type: integer
            total_duration_seconds:
              type: number
            speech_indexed_seconds:
              type: number
              description: Total duration of assets that have a transcript (same source as LibraryStats)
            total_people:
              type: integer
            named_people_count:
              type: integer
              description: People with a real display name
            unidentified_people_count:
              type: integer
              description: People still carrying an auto-assigned "Person N" placeholder
            transcribed_assets:
              type: integer
            total_speaking_seconds:
              type: number
        top_people:
          type: array
          items:
            $ref: "#/components/schemas/TopPerson"
        top_topics:
          type: array
          items:
            $ref: "#/components/schemas/TopTopic"

    # ── Trends ────────────────────────────────────────────────────────────────
    TrendHeadline:
      type: object
      required: [title]
      properties:
        title:
          type: string
        url:
          type: ["string", "null"]

    TrendMatchedTopic:
      type: object
      required: [key, topic, asset_count]
      properties:
        key:
          type: string
          description: Normalized library topic key
        topic:
          type: string
          description: Human-readable topic label
        asset_count:
          type: integer

    YoutubeTrend:
      type: object
      required: [rank, title, matched_topics]
      properties:
        rank:
          type: integer
          description: Position by view count among topic-search results (1 = top)
        title:
          type: string
        channel:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
        views:
          type: ["integer", "null"]
        matched_topics:
          type: array
          description: Library topics that appear in this trending video's title/tags
          items:
            $ref: "#/components/schemas/TrendMatchedTopic"

    WebTrend:
      type: object
      required: [rank, key, topic, asset_count, result_count, headlines]
      properties:
        rank:
          type: integer
        key:
          type: string
          description: Normalized library topic key
        topic:
          type: string
        asset_count:
          type: integer
          description: Library assets tagged with this topic (computed at read time)
        result_count:
          type: integer
          description: Recent news results for this topic (past week)
        headlines:
          type: array
          items:
            $ref: "#/components/schemas/TrendHeadline"

    Trends:
      type: object
      required: [youtube_configured, web_configured, youtube, web]
      properties:
        fetched_at:
          type: ["string", "null"]
          description: When trend data was last fetched (null if never)
        youtube_configured:
          type: boolean
          description: Whether YouTube credentials are configured
        web_configured:
          type: boolean
          description: Whether a SearXNG instance is configured
        youtube:
          type: array
          description: Most-viewed recent YouTube videos found for library topics
          items:
            $ref: "#/components/schemas/YoutubeTrend"
        web:
          type: array
          description: Library topics ranked by recent news momentum
          items:
            $ref: "#/components/schemas/WebTrend"

    # ── Ratings ───────────────────────────────────────────────────────────────
    RatingRecord:
      type: object
      required: [id, provider, station, program_title, air_date, is_own]
      properties:
        id:
          type: string
        provider:
          type: string
          description: "nielsen | comscore | ispot | manual (CSV import)"
        market:
          type: ["string", "null"]
          description: Measurement market (e.g. "Columbus, OH")
        station:
          type: string
          description: Station or channel call letters (normalized uppercase)
        program_title:
          type: string
        air_date:
          type: string
          format: date
        start_time:
          type: ["string", "null"]
          description: "HH:MM local time slot start"
        end_time:
          type: ["string", "null"]
          description: "HH:MM local time slot end"
        rating:
          type: ["number", "null"]
          description: Household rating points
        share:
          type: ["number", "null"]
          description: Share of households using TV
        viewers:
          type: ["integer", "null"]
          description: Average audience (impressions)
        demo:
          type: ["object", "null"]
          additionalProperties:
            type: number
          description: "Demo breakdowns keyed by demo name (e.g. A25-54, P2+)"
        is_own:
          type: boolean
          description: Whether the station is one of ours (computed from OWN_STATIONS at read time)
        asset_id:
          type: ["string", "null"]
          description: Linked library asset, if any
        asset_filename:
          type: ["string", "null"]
          description: Filename of the linked asset (display convenience)
        import_id:
          type: ["string", "null"]

    RatingsListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RatingRecord"
        total:
          type: integer

    RatingsOverview:
      type: object
      required: [own_stations, kpis, trend, station_shares, top_programs]
      properties:
        own_stations:
          type: array
          items:
            type: string
          description: Configured own-station call letters (OWN_STATIONS)
        kpis:
          type: object
          required: [record_count, program_count]
          description: Own-station KPIs over the selected range
          properties:
            record_count:
              type: integer
            program_count:
              type: integer
            avg_rating:
              type: ["number", "null"]
            avg_share:
              type: ["number", "null"]
            peak_viewers:
              type: ["integer", "null"]
        trend:
          type: array
          description: Own-station daily averages over the selected range
          items:
            type: object
            required: [date]
            properties:
              date:
                type: string
                format: date
              avg_rating:
                type: ["number", "null"]
              avg_share:
                type: ["number", "null"]
              total_viewers:
                type: ["integer", "null"]
        station_shares:
          type: array
          description: All stations ranked by average share (competitive view)
          items:
            type: object
            required: [station, is_own, record_count]
            properties:
              station:
                type: string
              is_own:
                type: boolean
              avg_rating:
                type: ["number", "null"]
              avg_share:
                type: ["number", "null"]
              record_count:
                type: integer
        top_programs:
          type: array
          description: Own-station programs ranked by average rating
          items:
            type: object
            required: [program_title, station, airings]
            properties:
              program_title:
                type: string
              station:
                type: string
              airings:
                type: integer
              avg_rating:
                type: ["number", "null"]
              avg_share:
                type: ["number", "null"]
              best_rating:
                type: ["number", "null"]

    RatingsImport:
      type: object
      required: [id, filename, provider, row_count, error_count, created_at]
      properties:
        id:
          type: string
        filename:
          type: string
        provider:
          type: string
        row_count:
          type: integer
          description: Rows successfully imported
        error_count:
          type: integer
          description: Rows skipped due to parse errors
        errors:
          type: ["array", "null"]
          items:
            type: string
          description: First few parse errors (import response only)
        created_at:
          type: string

    RatingsImportInput:
      type: object
      required: [file, provider]
      properties:
        file:
          type: string
          format: binary
        provider:
          type: string
          description: "Source of this file: nielsen | comscore | ispot | manual"
        market:
          type: string
          description: Default market when the CSV has no Market column

    RatingUpdate:
      type: object
      properties:
        asset_id:
          type: ["string", "null"]
          description: Media asset to link, or null to unlink

    # ── Search ────────────────────────────────────────────────────────────────
    SearchQuery:
      type: object
      required: [query]
      properties:
        query:
          type: string
        media_id:
          type: ["string", "null"]
          description: Restrict search to a specific asset
        media_ids:
          type: ["array", "null"]
          items:
            type: string
          description: Restrict search to a set of assets (e.g. a project's media pool)
        search_type:
          type: string
          description: "transcript | visual | combined"
          default: combined
        limit:
          type: integer
          default: 20

    SearchResult:
      type: object
      required: [media_id, filename, start_time, end_time, score, match_type]
      properties:
        media_id:
          type: string
        filename:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        score:
          type: number
        match_type:
          type: string
          description: "transcript | visual"
        snippet:
          type: ["string", "null"]
          description: Matching transcript text

    SearchResponse:
      type: object
      required: [results, query, took_ms]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        query:
          type: string
        took_ms:
          type: number

    ScriptMatchRequest:
      type: object
      required: [script]
      properties:
        script:
          type: string
          minLength: 1
          description: Script, rundown, or story outline; matched line by line
        media_id:
          type: ["string", "null"]
          description: Restrict matching to one asset
        media_ids:
          type: ["array", "null"]
          items:
            type: string
          description: Restrict matching to a set of assets (e.g. a project's media pool)
        matches_per_line:
          type: integer
          default: 3
          minimum: 1
          maximum: 10

    ScriptMatchLine:
      type: object
      required: [line, matches]
      properties:
        line:
          type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"

    ScriptMatchResponse:
      type: object
      required: [lines, took_ms]
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ScriptMatchLine"
        took_ms:
          type: number

    SearchHistoryItem:
      type: object
      required: [id, query, result_count, searched_at]
      properties:
        id:
          type: string
        query:
          type: string
        result_count:
          type: integer
        searched_at:
          type: string

    # ── Jobs ─────────────────────────────────────────────────────────────────
    ProcessingJob:
      type: object
      required: [id, job_type, status, created_at]
      properties:
        id:
          type: string
        media_id:
          type: ["string", "null"]
          description: Null for library-wide jobs (e.g. insights)
        filename:
          type: ["string", "null"]
        job_type:
          type: string
          description: "ingest | proxy | audio_extract | transcribe | diarize | scene_detect | visual_embed | face_detect | index | analyze | translate | dub | identify | insights"
        status:
          type: string
          description: "pending | running | success | error | cancelled"
        progress:
          type: ["number", "null"]
          description: 0-100
        error_message:
          type: ["string", "null"]
        logs:
          type: array
          items:
            type: string
        retry_count:
          type: integer
        created_at:
          type: string
        started_at:
          type: ["string", "null"]
        finished_at:
          type: ["string", "null"]

    JobCleanupRequest:
      type: object
      properties:
        statuses:
          type: array
          description: "Finished statuses to delete. Defaults to all of: success, error, cancelled."
          items:
            type: string

    JobCleanupResult:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer

    ResumeStalledResult:
      type: object
      required: [assets_resumed, jobs_created, assets_marked_ready]
      properties:
        assets_resumed:
          type: integer
        jobs_created:
          type: integer
        assets_marked_ready:
          type: integer

    RetryFailedResult:
      type: object
      required: [retried]
      properties:
        retried:
          type: integer

    JobStageStats:
      type: object
      required: [job_type, pending, running, success, error]
      properties:
        job_type:
          type: string
        pending:
          type: integer
        running:
          type: integer
        success:
          type: integer
        error:
          type: integer

    JobStats:
      type: object
      required:
        [
          assets_total,
          assets_ready,
          assets_processing,
          assets_error,
          jobs_pending,
          jobs_running,
          jobs_error,
          stages,
        ]
      properties:
        assets_total:
          type: integer
        assets_ready:
          type: integer
        assets_processing:
          type: integer
        assets_error:
          type: integer
        jobs_pending:
          type: integer
        jobs_running:
          type: integer
        jobs_error:
          type: integer
        stages:
          type: array
          items:
            $ref: "#/components/schemas/JobStageStats"

    # ── AI ───────────────────────────────────────────────────────────────────
    AIQuestion:
      type: object
      required: [question]
      properties:
        question:
          type: string
        conversation_id:
          type: ["string", "null"]
        media_id:
          type: ["string", "null"]

    AICitation:
      type: object
      required: [media_id, filename, start_time, end_time]
      properties:
        media_id:
          type: string
        filename:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        snippet:
          type: ["string", "null"]

    AIAnswer:
      type: object
      required: [answer, conversation_id, citations]
      properties:
        answer:
          type: string
        conversation_id:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/AICitation"

    Conversation:
      type: object
      required: [id, created_at, message_count]
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        created_at:
          type: string
        message_count:
          type: integer

    AIMessage:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id:
          type: string
        conversation_id:
          type: string
        role:
          type: string
          description: "user | assistant"
        content:
          type: string
        citations:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/AICitation"
        created_at:
          type: string

    # ── Clips ─────────────────────────────────────────────────────────────────
    Clip:
      type: object
      required: [id, media_id, start_time, end_time]
      properties:
        id:
          type: string
        media_id:
          type: string
        filename:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        label:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        approved:
          type: boolean
          default: false
          description: Editor reviewed this beat in Refine and signed off
        match_reason:
          type: ["string", "null"]
          description: Why this range was picked (search snippet / script-match line / story beat rationale)
        thumbnail_url:
          type: ["string", "null"]
          description: Preview frame near the clip start (relative thumbnail path)

    # ── Projects ──────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, created_at, counts]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        script:
          type: ["string", "null"]
          description: Working script/rundown text used in the Find stage
        status:
          type: string
          enum: [active, archived]
          default: active
        media_ids:
          type: array
          items:
            type: string
          default: []
          description: Media pool — asset ids this project works with; empty means the whole library
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]
        counts:
          type: object
          required: [clip_lists, stories, reels, renders]
          properties:
            clip_lists:
              type: integer
            stories:
              type: integer
            reels:
              type: integer
            renders:
              type: integer

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        script:
          type: ["string", "null"]
        media_ids:
          type: ["array", "null"]
          items:
            type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        script:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, archived]
        media_ids:
          type: ["array", "null"]
          items:
            type: string

    ClipList:
      type: object
      required: [id, name, created_at, clips]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        locked:
          type: boolean
          default: false
        created_at:
          type: string
        clips:
          type: array
          items:
            $ref: "#/components/schemas/Clip"

    ClipListInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        project_id:
          type: ["string", "null"]
        clips:
          type: array
          items:
            type: object
            required: [media_id, start_time, end_time]
            properties:
              media_id:
                type: string
              start_time:
                type: number
              end_time:
                type: number
              label:
                type: string
              notes:
                type: ["string", "null"]
              approved:
                type: boolean
              match_reason:
                type: ["string", "null"]

    ClipListUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        project_id:
          type: ["string", "null"]
        locked:
          type: boolean
        clips:
          type: array
          items:
            type: object
            required: [media_id, start_time, end_time]
            properties:
              media_id:
                type: string
              start_time:
                type: number
              end_time:
                type: number
              label:
                type: string
              notes:
                type: ["string", "null"]
              approved:
                type: boolean
              match_reason:
                type: ["string", "null"]

    # ── Renders & publishing ──────────────────────────────────────────────────
    RenderPresetInput:
      type: object
      properties:
        preset:
          type: string
          enum: [original, vertical]
          default: original
          description: original keeps source framing; vertical crops to 9:16 (1080x1920)
        burn_captions:
          type: boolean
          default: false
          description: Burn transcript captions into the video

    RenderRequest:
      type: object
      required: [media_id, start_time, end_time]
      properties:
        media_id:
          type: string
        start_time:
          type: number
          minimum: 0
        end_time:
          type: number
          minimum: 0
        label:
          type: ["string", "null"]
        clip_list_id:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        preset:
          type: string
          enum: [original, vertical]
          default: original
        burn_captions:
          type: boolean
          default: false

    RenderJob:
      type: object
      required: [id, media_id, start_time, end_time, preset, burn_captions, status, progress, created_at]
      properties:
        id:
          type: string
        media_id:
          type: string
        filename:
          type: ["string", "null"]
          description: Source asset filename
        clip_list_id:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        label:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        preset:
          type: string
          description: original | vertical
        burn_captions:
          type: boolean
        unreviewed:
          type: ["boolean", "null"]
          description: True when the source clip list was not fully approved at render time
        status:
          type: string
          description: pending | running | success | error
        progress:
          type: number
        output_url:
          type: ["string", "null"]
          description: Set when status is success
        error_message:
          type: ["string", "null"]
        publish_status:
          type: ["string", "null"]
          description: null | pending | running | success | error
        publish_url:
          type: ["string", "null"]
          description: Public URL after successful publish
        publish_error:
          type: ["string", "null"]
        publish_stats:
          type: ["object", "null"]
          description: Real platform performance stats pulled periodically after publish
          properties:
            platform:
              type: string
            views:
              type: integer
            likes:
              type: integer
            comments:
              type: integer
            fetched_at:
              type: string
        created_at:
          type: string
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time

    PublishRequest:
      type: object
      required: [title]
      properties:
        platform:
          type: string
          enum: [youtube]
          default: youtube
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
          default: []
        privacy:
          type: string
          enum: [public, unlisted, private]
          default: unlisted

    PublishPlatforms:
      type: object
      required: [youtube]
      properties:
        youtube:
          type: boolean
          description: True when YouTube credentials are configured on the server

    # ── Reels ─────────────────────────────────────────────────────────────────
    ReelRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 3
          description: 'What to highlight, e.g. "the fact about faith"'
        media_id:
          type: ["string", "null"]
          description: Restrict the reel to one asset, or null/omitted for the whole library
        media_ids:
          type: ["array", "null"]
          items:
            type: string
          description: Restrict the reel to a set of assets (e.g. a project's media pool)
        project_id:
          type: ["string", "null"]
        target_duration_seconds:
          type: ["number", "null"]
          minimum: 30
          maximum: 14400
          description: Desired run time in seconds; the builder selects enough material to reach it (up to 4 hours)
        preset:
          type: string
          enum: [original, vertical]
          default: original
        burn_captions:
          type: boolean
          default: false
        max_clips:
          type: integer
          default: 6
          minimum: 1
          maximum: 500
          description: Clip cap when no target duration is given

    ReelClip:
      type: object
      required: [media_id, filename, start_time, end_time]
      properties:
        media_id:
          type: string
        filename:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        snippet:
          type: ["string", "null"]
          description: Transcript text that matched the prompt
        thumbnail_url:
          type: ["string", "null"]
          description: Preview frame near the clip start (relative thumbnail path)

    ReelJob:
      type: object
      required: [id, prompt, preset, burn_captions, clips, status, progress, created_at]
      properties:
        id:
          type: string
        prompt:
          type: string
        media_id:
          type: ["string", "null"]
          description: Set when the reel is scoped to one asset
        project_id:
          type: ["string", "null"]
        target_duration_seconds:
          type: ["number", "null"]
          description: Requested run time in seconds, when one was given
        preset:
          type: string
          description: original | vertical
        burn_captions:
          type: boolean
        unreviewed:
          type: ["boolean", "null"]
          description: True when the source clip list was not fully approved at render time
        clips:
          type: array
          items:
            $ref: "#/components/schemas/ReelClip"
        status:
          type: string
          description: pending | running | success | error
        progress:
          type: number
        output_url:
          type: ["string", "null"]
          description: Set when status is success
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
          format: date-time
        finished_at:
          type: ["string", "null"]
          format: date-time

    SocialCutsRequest:
      type: object
      properties:
        platform:
          type: ["string", "null"]
          enum: [youtube, instagram, x, facebook, tiktok, null]
          description: Cut for one platform, or null/omitted for all scored platforms

    ClipExportInput:
      type: object
      required: [format]
      properties:
        format:
          type: string
          description: "edl | csv | json | fcpxml | otio"

    TightenInput:
      type: object
      properties:
        silence_threshold:
          type: number
          description: Minimum gap between speech segments (seconds) to cut, default 1.25
        remove_fillers:
          type: boolean
          description: Also cut segments that are only filler words, default true

    TightenCut:
      type: object
      required: [start, end, reason]
      properties:
        start:
          type: number
        end:
          type: number
        reason:
          type: string
          description: "silence | filler"

    TightenResult:
      type: object
      required: [media_id, clip_list_id, kept_segments, cuts, removed_seconds, original_duration]
      properties:
        media_id:
          type: string
        clip_list_id:
          type: string
          description: Clip list containing the kept segments, ready for export or rough cut
        kept_segments:
          type: integer
        cuts:
          type: array
          items:
            $ref: "#/components/schemas/TightenCut"
        removed_seconds:
          type: number
        original_duration:
          type: number

    RoughCutInput:
      type: object
      properties:
        preset:
          type: string
          description: "original | vertical, default original"
        burn_captions:
          type: boolean
          description: Burn subtitles into the video, default false

    StoryRequestIn:
      type: object
      required: [asset_ids]
      properties:
        asset_ids:
          type: array
          items:
            type: string
          minItems: 1
        prompt:
          type: ["string", "null"]
          description: Optional editorial direction for the storyline
        project_id:
          type: ["string", "null"]

    StoryJob:
      type: object
      required: [id, asset_ids, status, progress, created_at]
      properties:
        id:
          type: string
        prompt:
          type: ["string", "null"]
        project_id:
          type: ["string", "null"]
        asset_ids:
          type: array
          items:
            type: string
        status:
          type: string
          description: "pending | running | success | error"
        progress:
          type: number
        title:
          type: ["string", "null"]
        narrative:
          type: ["string", "null"]
        clip_list_id:
          type: ["string", "null"]
          description: Clip list with the ordered cross-asset clips
        error_message:
          type: ["string", "null"]
        created_at:
          type: string
        finished_at:
          type: ["string", "null"]

    ClipExportResult:
      type: object
      required: [format, content]
      properties:
        format:
          type: string
        content:
          type: string
        filename:
          type: string

    # ── Auth & users ─────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    SessionUser:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, user, viewer]

    PasswordChangeInput:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 72
          description: 8-72 characters (bcrypt limit)

    UserOut:
      type: object
      required: [id, username, role, disabled, created_at]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, user, viewer]
        disabled:
          type: boolean
        created_at:
          type: string
        last_seen:
          type: ["string", "null"]
          description: Last session activity, if any

    UserCreate:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          description: 3-50 chars, letters/digits/._- only
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: 8-72 characters (bcrypt limit)
        role:
          type: string
          enum: [admin, user, viewer]
        display_name:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        role:
          type: ["string", "null"]
          enum: [admin, user, viewer, null]
        display_name:
          type: ["string", "null"]
        disabled:
          type: ["boolean", "null"]
        password:
          type: ["string", "null"]
          minLength: 8
          maxLength: 72
          description: Set to reset the user's password (8-72 chars, bcrypt limit); invalidates their sessions
