openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: obtv-ai media intelligence platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: media
    description: Media library management
  - name: search
    description: Semantic search
  - name: jobs
    description: Processing jobs
  - name: player
    description: Playback and scene data
  - name: ai
    description: AI Q&A
  - name: clips
    description: Clip lists
  - name: people
    description: Cross-asset person identities
  - name: insights
    description: Library-wide AI insights
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Media ──────────────────────────────────────────────────────────────────
  /media:
    get:
      operationId: listMedia
      tags: [media]
      summary: List all media assets
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
    post:
      operationId: ingestMedia
      tags: [media]
      summary: Queue a media file for ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaIngestInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"

  /media/upload:
    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload a media file directly and queue it for ingestion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MediaUploadInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Unsupported file type

  /media/{id}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get media asset details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "404":
          description: Not found
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Remove media from the library
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /media/{id}/scenes:
    get:
      operationId: getMediaScenes
      tags: [player]
      summary: Get detected scenes for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scene"

  /media/{id}/transcript:
    get:
      operationId: getMediaTranscript
      tags: [player]
      summary: Get transcript segments for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
          description: ISO language code — return translated text where available
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranscriptSegment"

  /media/{id}/translate:
    post:
      operationId: createTranslation
      tags: [media]
      summary: Translate the transcript into a target language
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "202":
          description: Translation job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"
        "400":
          description: No transcript available or unsupported language
        "404":
          description: Media not found

  /media/{id}/dub:
    post:
      operationId: createDub
      tags: [media]
      summary: Generate a dubbed audio track from the translated transcript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DubRequest"
      responses:
        "202":
          description: Dub job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"
        "400":
          description: Language not translated yet or dubbing unsupported for language
        "404":
          description: Media not found

  /media/{id}/dub/{lang}/stream:
    get:
      operationId: streamDub
      tags: [player]
      summary: Stream the dubbed audio track for a language
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dubbed audio (AAC in M4A container)
          content:
            audio/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: No dubbed audio for this language

  /media/{id}/faces:
    get:
      operationId: getMediaFaces
      tags: [player]
      summary: Get detected face clusters for a media asset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaceCluster"

  /media/{id}/highlight:
    post:
      operationId: createHighlight
      tags: [media]
      summary: Generate a highlight reel video from the asset's key moments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Highlight job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  /media/{id}/social:
    post:
      operationId: createSocialAnalysis
      tags: [media]
      summary: Score the asset's social media potential across platforms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Social analysis job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  # ── Stats ────────────────────────────────────────────────────────────────
  /media/stats/summary:
    get:
      operationId: getLibraryStats
      tags: [media]
      summary: Library-wide stats (counts, totals, status breakdown)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"

  # ── People ─────────────────────────────────────────────────────────────────
  /people:
    get:
      operationId: listPeople
      tags: [people]
      summary: List identified people across the library (paginated)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 48
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeoplePage"

  /people/{id}:
    get:
      operationId: getPerson
      tags: [people]
      summary: Person profile with per-asset appearances
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetail"
        "404":
          description: Not found
    patch:
      operationId: updatePerson
      tags: [people]
      summary: Rename a person
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found

  /people/{id}/merge:
    post:
      operationId: mergePerson
      tags: [people]
      summary: Merge another person into this one (fix duplicate identities)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonMergeRequest"
      responses:
        "200":
          description: Merged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Person"
        "404":
          description: Not found

  /people/reanalyze:
    post:
      operationId: reanalyzePeople
      tags: [people]
      summary: Re-run diarization and face analysis across the library to backfill person identification
      responses:
        "202":
          description: Jobs queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReanalyzeResult"

  # ── Insights ───────────────────────────────────────────────────────────────
  /insights:
    get:
      operationId: getLibraryInsights
      tags: [insights]
      summary: Library-wide aggregates plus the latest AI-generated narrative
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryInsights"

  /insights/refresh:
    post:
      operationId: refreshLibraryInsights
      tags: [insights]
      summary: Queue a library-wide AI insights regeneration job
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"
        "409":
          description: An insights job is already running

  # ── Search ────────────────────────────────────────────────────────────────
  /search:
    post:
      operationId: semanticSearch
      tags: [search]
      summary: Semantic search across indexed media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchQuery"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /search/history:
    get:
      operationId: getSearchHistory
      tags: [search]
      summary: Recent searches
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchHistoryItem"

  # ── Jobs ──────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List processing jobs
      parameters:
        - name: media_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessingJob"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details including logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  /jobs/cleanup:
    post:
      operationId: cleanupJobs
      tags: [jobs]
      summary: Delete finished jobs (success, error, cancelled) from the history
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCleanupRequest"
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCleanupResult"

  /jobs/{id}/retry:
    post:
      operationId: retryJob
      tags: [jobs]
      summary: Retry a failed job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Retrying
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  /jobs/{id}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a pending or running job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingJob"

  # ── AI Q&A ────────────────────────────────────────────────────────────────
  /ai/ask:
    post:
      operationId: askAI
      tags: [ai]
      summary: Ask the AI a question about indexed media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIQuestion"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnswer"

  /ai/conversations:
    get:
      operationId: listConversations
      tags: [ai]
      summary: List AI conversation history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /ai/conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [ai]
      summary: Get all messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AIMessage"
        "404":
          description: Conversation not found

  # ── Clips ─────────────────────────────────────────────────────────────────
  /clips:
    get:
      operationId: listClipLists
      tags: [clips]
      summary: List all clip lists
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClipList"
    post:
      operationId: createClipList
      tags: [clips]
      summary: Create a new clip list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClipListInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipList"

  /clips/{id}:
    get:
      operationId: getClipList
      tags: [clips]
      summary: Get a clip list with its clips
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipList"
    patch:
      operationId: updateClipList
      tags: [clips]
      summary: Update a clip list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClipListUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipList"
    delete:
      operationId: deleteClipList
      tags: [clips]
      summary: Delete a clip list
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /clips/{id}/export:
    post:
      operationId: exportClipList
      tags: [clips]
      summary: Export a clip list (EDL/CSV/JSON)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClipExportInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipExportResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Media ────────────────────────────────────────────────────────────────
    TranslateRequest:
      type: object
      required: [target_language]
      properties:
        target_language:
          type: string
          description: "ISO code: es | fr | de | pt | it | nl | ru | ja | ko | zh | ar | hi"

    DubRequest:
      type: object
      required: [target_language]
      properties:
        target_language:
          type: string
          description: "ISO code with MMS-TTS support: es | fr | de | pt | nl | ru | ko | ar | hi"

    SocialScore:
      type: object
      required: [platform, score]
      properties:
        platform:
          type: string
          description: "youtube | instagram | x | facebook | tiktok"
        score:
          type: number
          description: Predicted performance score, 0-100
        verdict:
          type: ["string", "null"]
          description: One-line performance verdict
        strengths:
          type: ["array", "null"]
          items:
            type: string
        weaknesses:
          type: ["array", "null"]
          items:
            type: string
        best_format:
          type: ["string", "null"]
          description: Recommended format/cut for this platform
        suggested_caption:
          type: ["string", "null"]
        hashtags:
          type: ["array", "null"]
          items:
            type: string

    MediaAsset:
      type: object
      required: [id, filename, status, created_at]
      properties:
        id:
          type: string
        filename:
          type: string
        original_path:
          type: ["string", "null"]
        proxy_path:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        duration_seconds:
          type: ["number", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
        fps:
          type: ["number", "null"]
        codec:
          type: ["string", "null"]
        file_size_bytes:
          type: ["integer", "null"]
        status:
          type: string
          description: "pending | processing | ready | error"
        processing_stage:
          type: ["string", "null"]
          description: Current processing stage name
        processing_progress:
          type: ["number", "null"]
          description: 0-100 percent
        scene_count:
          type: ["integer", "null"]
        speaker_count:
          type: ["integer", "null"]
        highlight_url:
          type: ["string", "null"]
          description: Set when a generated highlight reel is available
        translated_languages:
          type: ["array", "null"]
          items:
            type: string
          description: ISO codes of languages the transcript has been translated into
        dubbed_languages:
          type: ["array", "null"]
          items:
            type: string
          description: ISO codes of languages with a generated dubbed audio track
        social_scores:
          type: ["array", "null"]
          description: Per-platform social media performance predictions
          items:
            $ref: "#/components/schemas/SocialScore"
        synopsis:
          type: ["string", "null"]
          description: AI-generated synopsis of the content
        key_moments:
          type: ["array", "null"]
          description: AI-detected key moments with timecodes
          items:
            $ref: "#/components/schemas/KeyMoment"
        topics:
          type: ["array", "null"]
          description: AI-extracted topic tags
          items:
            type: string
        created_at:
          type: string
        updated_at:
          type: ["string", "null"]

    KeyMoment:
      type: object
      required: [time, title]
      properties:
        time:
          type: number
          description: Timecode in seconds
        title:
          type: string
        description:
          type: ["string", "null"]

    MediaListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        total:
          type: integer

    MediaUploadInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
        title:
          type: string

    MediaIngestInput:
      type: object
      required: [file_path]
      properties:
        file_path:
          type: string
          description: Absolute path to the source media file on the server
        title:
          type: string

    LibraryStats:
      type: object
      required: [total_assets, total_duration_seconds, status_counts, storage_bytes]
      properties:
        total_assets:
          type: integer
        total_duration_seconds:
          type: number
        status_counts:
          type: object
          additionalProperties:
            type: integer
        storage_bytes:
          type: integer
        recent_activity:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"

    Scene:
      type: object
      required: [id, media_id, start_time, end_time]
      properties:
        id:
          type: string
        media_id:
          type: string
        start_time:
          type: number
          description: Seconds
        end_time:
          type: number
          description: Seconds
        thumbnail_url:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        embedding_id:
          type: ["string", "null"]

    TranscriptSegment:
      type: object
      required: [id, media_id, start_time, end_time, text]
      properties:
        id:
          type: string
        media_id:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        text:
          type: string
        speaker:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]

    FaceCluster:
      type: object
      required: [cluster_id, media_id, appearances]
      properties:
        cluster_id:
          type: string
        media_id:
          type: string
        label:
          type: ["string", "null"]
        thumbnail_url:
          type: ["string", "null"]
        appearances:
          type: array
          items:
            type: object
            required: [start_time, end_time]
            properties:
              start_time:
                type: number
              end_time:
                type: number

    # ── People ────────────────────────────────────────────────────────────────
    Person:
      type: object
      required: [id, display_name, asset_count, total_speaking_seconds, segment_count]
      properties:
        id:
          type: string
        display_name:
          type: string
        name_source:
          type: ["string", "null"]
          description: "auto (LLM-extracted from transcripts) | manual | null (unnamed)"
        thumbnail_url:
          type: ["string", "null"]
        speech_style:
          type: ["string", "null"]
          description: AI summary of how this person speaks
        key_topics:
          type: array
          items:
            type: string
        summary:
          type: ["string", "null"]
          description: AI bio of who this person appears to be
        asset_count:
          type: integer
        total_speaking_seconds:
          type: number
        segment_count:
          type: integer
        updated_at:
          type: ["string", "null"]

    PersonAppearance:
      type: object
      required: [media_id, filename]
      properties:
        media_id:
          type: string
        filename:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        duration_seconds:
          type: ["number", "null"]
        speaker_label:
          type: ["string", "null"]
        face_cluster_id:
          type: ["string", "null"]
        speaking_seconds:
          type: ["number", "null"]
        segment_count:
          type: ["integer", "null"]
        first_spoken_at:
          type: ["number", "null"]
          description: Seconds into the asset where this person first speaks

    PersonDetail:
      allOf:
        - $ref: "#/components/schemas/Person"
        - type: object
          required: [appearances]
          properties:
            appearances:
              type: array
              items:
                $ref: "#/components/schemas/PersonAppearance"

    PersonUpdate:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          minLength: 1

    PersonMergeRequest:
      type: object
      required: [source_person_id]
      properties:
        source_person_id:
          type: string
          description: Person to merge into the target; the source is deleted

    PeoplePage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Person"
        total:
          type: integer
          description: Total number of people in the library

    ReanalyzeResult:
      type: object
      required: [assets_queued, jobs_created]
      properties:
        assets_queued:
          type: integer
          description: Number of media assets queued for re-analysis
        jobs_created:
          type: integer
          description: Total diarize/face_detect jobs created

    # ── Insights ──────────────────────────────────────────────────────────────
    InsightItem:
      type: object
      required: [title, detail]
      properties:
        title:
          type: string
        detail:
          type: string

    TopPerson:
      type: object
      required: [person_id, display_name, asset_count, speaking_seconds]
      properties:
        person_id:
          type: string
        display_name:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        asset_count:
          type: integer
        speaking_seconds:
          type: number

    TopTopic:
      type: object
      required: [topic, asset_count]
      properties:
        topic:
          type: string
        asset_count:
          type: integer

    LibraryInsights:
      type: object
      required: [stats, top_people, top_topics, insights]
      properties:
        generated_at:
          type: ["string", "null"]
          description: When the AI narrative was last generated (null if never)
        headline:
          type: ["string", "null"]
        insights:
          type: array
          items:
            $ref: "#/components/schemas/InsightItem"
        stats:
          type: object
          required: [total_assets, total_duration_seconds, total_people, transcribed_assets, total_speaking_seconds]
          properties:
            total_assets:
              type: integer
            total_duration_seconds:
              type: number
            total_people:
              type: integer
            transcribed_assets:
              type: integer
            total_speaking_seconds:
              type: number
        top_people:
          type: array
          items:
            $ref: "#/components/schemas/TopPerson"
        top_topics:
          type: array
          items:
            $ref: "#/components/schemas/TopTopic"

    # ── Search ────────────────────────────────────────────────────────────────
    SearchQuery:
      type: object
      required: [query]
      properties:
        query:
          type: string
        media_id:
          type: ["string", "null"]
          description: Restrict search to a specific asset
        search_type:
          type: string
          description: "transcript | visual | combined"
          default: combined
        limit:
          type: integer
          default: 20

    SearchResult:
      type: object
      required: [media_id, filename, start_time, end_time, score, match_type]
      properties:
        media_id:
          type: string
        filename:
          type: string
        thumbnail_url:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        score:
          type: number
        match_type:
          type: string
          description: "transcript | visual"
        snippet:
          type: ["string", "null"]
          description: Matching transcript text

    SearchResponse:
      type: object
      required: [results, query, took_ms]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        query:
          type: string
        took_ms:
          type: number

    SearchHistoryItem:
      type: object
      required: [id, query, result_count, searched_at]
      properties:
        id:
          type: string
        query:
          type: string
        result_count:
          type: integer
        searched_at:
          type: string

    # ── Jobs ─────────────────────────────────────────────────────────────────
    ProcessingJob:
      type: object
      required: [id, job_type, status, created_at]
      properties:
        id:
          type: string
        media_id:
          type: ["string", "null"]
          description: Null for library-wide jobs (e.g. insights)
        filename:
          type: ["string", "null"]
        job_type:
          type: string
          description: "ingest | proxy | audio_extract | transcribe | diarize | scene_detect | visual_embed | face_detect | index | analyze | translate | dub | identify | insights"
        status:
          type: string
          description: "pending | running | success | error | cancelled"
        progress:
          type: ["number", "null"]
          description: 0-100
        error_message:
          type: ["string", "null"]
        logs:
          type: array
          items:
            type: string
        retry_count:
          type: integer
        created_at:
          type: string
        started_at:
          type: ["string", "null"]
        finished_at:
          type: ["string", "null"]

    JobCleanupRequest:
      type: object
      properties:
        statuses:
          type: array
          description: "Finished statuses to delete. Defaults to all of: success, error, cancelled."
          items:
            type: string

    JobCleanupResult:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer

    # ── AI ───────────────────────────────────────────────────────────────────
    AIQuestion:
      type: object
      required: [question]
      properties:
        question:
          type: string
        conversation_id:
          type: ["string", "null"]
        media_id:
          type: ["string", "null"]

    AICitation:
      type: object
      required: [media_id, filename, start_time, end_time]
      properties:
        media_id:
          type: string
        filename:
          type: string
        start_time:
          type: number
        end_time:
          type: number
        snippet:
          type: ["string", "null"]

    AIAnswer:
      type: object
      required: [answer, conversation_id, citations]
      properties:
        answer:
          type: string
        conversation_id:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/AICitation"

    Conversation:
      type: object
      required: [id, created_at, message_count]
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        created_at:
          type: string
        message_count:
          type: integer

    AIMessage:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id:
          type: string
        conversation_id:
          type: string
        role:
          type: string
          description: "user | assistant"
        content:
          type: string
        citations:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/AICitation"
        created_at:
          type: string

    # ── Clips ─────────────────────────────────────────────────────────────────
    Clip:
      type: object
      required: [id, media_id, start_time, end_time]
      properties:
        id:
          type: string
        media_id:
          type: string
        filename:
          type: ["string", "null"]
        start_time:
          type: number
        end_time:
          type: number
        label:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    ClipList:
      type: object
      required: [id, name, created_at, clips]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        created_at:
          type: string
        clips:
          type: array
          items:
            $ref: "#/components/schemas/Clip"

    ClipListInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        clips:
          type: array
          items:
            type: object
            required: [media_id, start_time, end_time]
            properties:
              media_id:
                type: string
              start_time:
                type: number
              end_time:
                type: number
              label:
                type: string

    ClipListUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        clips:
          type: array
          items:
            type: object
            required: [media_id, start_time, end_time]
            properties:
              media_id:
                type: string
              start_time:
                type: number
              end_time:
                type: number
              label:
                type: string

    ClipExportInput:
      type: object
      required: [format]
      properties:
        format:
          type: string
          description: "edl | csv | json"

    ClipExportResult:
      type: object
      required: [format, content]
      properties:
        format:
          type: string
        content:
          type: string
        filename:
          type: string
