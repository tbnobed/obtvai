
# ─── Shared environment for all Python services ───────────────────────────────
x-python-env: &python-env
  DATABASE_URL: "postgresql+asyncpg://obtv:obtv@postgres:5432/obtv"
  DATABASE_URL_SYNC: "postgresql://obtv:obtv@postgres:5432/obtv"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  MEDIA_ROOT: "/media"
  ARTIFACTS_ROOT: "/artifacts"
  PROXIES_DIR: "/artifacts/proxies"
  THUMBNAILS_DIR: "/artifacts/thumbnails"
  AUDIO_DIR: "/artifacts/audio"
  WHISPER_MODEL: "${WHISPER_MODEL:-large-v3}"
  EMBEDDINGS_MODEL: "${EMBEDDINGS_MODEL:-sentence-transformers/all-MiniLM-L6-v2}"
  VISION_MODEL: "${VISION_MODEL:-openai/clip-vit-large-patch14}"
  LLM_MODEL: "${LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
  HF_TOKEN: "${HF_TOKEN:-}"

# ─── Volume definitions ───────────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  artifacts_data:
  models_cache:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: obtv
      POSTGRES_PASSWORD: obtv
      POSTGRES_DB: obtv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obtv"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Celery monitoring ────────────────────────────────────────────────────────
  flower:
    build:
      context: ./services/worker
    restart: unless-stopped
    environment:
      <<: *python-env
    command: celery -A app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]
    environment:
      <<: *python-env
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${UPLOAD_PATH:-./uploads}:/uploads"
      - artifacts_data:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Workers ──────────────────────────────────────────────────────────────────
  worker-gpu:
    build:
      context: ./services/worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]
    environment:
      <<: *python-env
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${UPLOAD_PATH:-./uploads}:/uploads:ro"
      - artifacts_data:/artifacts
      - models_cache:/root/.cache
    command: celery -A app worker --queues=gpu --concurrency=1 --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker-cpu:
    build:
      context: ./services/worker
    restart: unless-stopped
    # NVENC hardware video encoding for proxy generation (defaults to GPU 0 = RTX 5090).
    # 'video' capability is required for the encoder; 'compute'/'utility' for CUDA basics.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVENC_GPU_DEVICE_ID:-0}"]
              capabilities: [gpu, video]
    environment:
      <<: *python-env
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${UPLOAD_PATH:-./uploads}:/uploads:ro"
      - artifacts_data:/artifacts
      - models_cache:/root/.cache
    command: celery -A app worker --queues=cpu,ingest --concurrency=4 --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── File watcher ─────────────────────────────────────────────────────────────
  watcher:
    build:
      context: ./services/watcher
    restart: unless-stopped
    environment:
      <<: *python-env
      API_URL: "http://api:8000/api"
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
    depends_on:
      api:
        condition: service_healthy

  # ── Frontend + nginx ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: artifacts/frontend/Dockerfile.production
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      api:
        condition: service_healthy
