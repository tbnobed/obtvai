
# ─── Shared environment for all Python services ───────────────────────────────
x-python-env: &python-env
  DATABASE_URL: "postgresql+asyncpg://obtv:obtv@postgres:5432/obtv"
  DATABASE_URL_SYNC: "postgresql://obtv:obtv@postgres:5432/obtv"
  REDIS_URL: "redis://redis:6379/0"
  QDRANT_URL: "http://qdrant:6333"
  MEDIA_ROOT: "/media"
  ARTIFACTS_ROOT: "/artifacts"
  PROXIES_DIR: "/artifacts/proxies"
  THUMBNAILS_DIR: "/artifacts/thumbnails"
  AUDIO_DIR: "/artifacts/audio"
  REELS_DIR: "/artifacts/reels"
  RENDERS_DIR: "/artifacts/renders"
  VOICES_DIR: "/artifacts/voices"
  GRAPHICS_DIR: "/artifacts/graphics"
  COMFYUI_URL: "${COMFYUI_URL:-http://host.docker.internal:8188}"
  COMFYUI_URL_IMAGE: "${COMFYUI_URL_IMAGE:-}"
  COMFYUI_URL_VIDEO: "${COMFYUI_URL_VIDEO:-}"
  COMFY_WORKFLOWS_DIR: "/workflows"
  COQUI_TOS_AGREED: "1"
  YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID:-}"
  YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET:-}"
  YOUTUBE_REFRESH_TOKEN: "${YOUTUBE_REFRESH_TOKEN:-}"
  YOUTUBE_API_KEY: "${YOUTUBE_API_KEY:-}"
  SEARXNG_URL: "${SEARXNG_URL:-http://searxng:8080}"
  SERPAPI_KEY: "${SERPAPI_KEY:-}"
  TRENDS_REGION: "${TRENDS_REGION:-US}"
  WHISPER_MODEL: "${WHISPER_MODEL:-large-v3}"
  ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
  ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
  INTERNAL_API_TOKEN: "${INTERNAL_API_TOKEN:-}"
  OWN_STATIONS: "${OWN_STATIONS:-}"
  EMBEDDINGS_MODEL: "${EMBEDDINGS_MODEL:-BAAI/bge-m3}"
  VISION_MODEL: "${VISION_MODEL:-google/siglip2-so400m-patch14-384}"
  LLM_MODEL: "${LLM_MODEL:-Qwen/Qwen3-8B}"
  TRANSLATE_MODEL: "${TRANSLATE_MODEL:-google/madlad400-3b-mt}"
  DIARIZATION_MODEL: "${DIARIZATION_MODEL:-pyannote/speaker-diarization-community-1}"
  HF_TOKEN: "${HF_TOKEN:-}"
  # Reduce CUDA fragmentation; workers share their GPU with ComfyUI
  PYTORCH_CUDA_ALLOC_CONF: "${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}"
  # Workers drop cached models (LLM/translator/TTS) after this many idle
  # seconds so ComfyUI gets the VRAM back between processing batches. 0 = off.
  GPU_IDLE_RELEASE_SECONDS: "${GPU_IDLE_RELEASE_SECONDS:-300}"
  # API search embedding models (bge-m3 + SigLIP) get a longer window since
  # search is latency-sensitive; they reload in ~10-20 s. 0 = off.
  EMBED_IDLE_RELEASE_SECONDS: "${EMBED_IDLE_RELEASE_SECONDS:-1800}"
  # IPV Curator proxy reuse: mount point inside containers + index cache TTL
  CURATOR_PROXY_ROOT: "/curator"
  CURATOR_INDEX_TTL: "${CURATOR_INDEX_TTL:-900}"
  # Path translation for NLE exports (EDL/FCPXML/OTIO), e.g.
  # EXPORT_PATH_MAP=/media=V:\Media;/media2=\\nas\media2
  EXPORT_PATH_MAP: "${EXPORT_PATH_MAP:-}"

# ─── Volume definitions ───────────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  artifacts_data:
  models_cache:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: obtv
      POSTGRES_PASSWORD: obtv
      POSTGRES_DB: obtv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obtv"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Self-hosted metasearch used by the trends worker to measure news momentum
  # for library topics. Only topic keywords are sent out; not exposed on the
  # host network. JSON output is enabled in ./searxng/settings.yml.
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    # Each RocksDB segment holds log/sst files open; a large library plus
    # heavy parallel ingest blows through the default 1024 fd limit
    # ("Too many open files" -> health check fails, upserts time out).
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Celery monitoring ────────────────────────────────────────────────────────
  flower:
    build:
      context: ./services/worker
    restart: unless-stopped
    environment:
      <<: *python-env
    command: celery -A app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]
    environment:
      <<: *python-env
    # Lets containers reach the host's ComfyUI at host.docker.internal:8188.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${MEDIA_PATH_2:-./sample_media_2}:/media2:ro"
      - "${UPLOAD_PATH:-./uploads}:/uploads"
      - "${COMFY_WORKFLOWS_PATH:-./comfy_workflows}:/workflows:ro"
      - "${CURATOR_PROXY_PATH:-./curator_proxies}:/curator:ro"
      - artifacts_data:/artifacts
      - models_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Workers ──────────────────────────────────────────────────────────────────
  worker-gpu:
    build:
      context: ./services/worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-1}"]
              capabilities: [gpu]
    environment:
      <<: *python-env
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${MEDIA_PATH_2:-./sample_media_2}:/media2:ro"
      - "${UPLOAD_PATH:-./uploads}:/uploads:ro"
      - "${CURATOR_PROXY_PATH:-./curator_proxies}:/curator:ro"
      - artifacts_data:/artifacts
      - models_cache:/root/.cache
    command: celery -A app worker --queues=gpu --concurrency=1 --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Second GPU worker: consumes the same "gpu" queue but is pinned to the other
  # card, so Celery distributes GPU jobs (transcribe, diarize, embed, scenes)
  # across both GPUs. Each worker loads its own copy of the models on its GPU.
  worker-gpu-2:
    build:
      context: ./services/worker
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU2_DEVICE_ID:-0}"]
              capabilities: [gpu]
    environment:
      <<: *python-env
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${MEDIA_PATH_2:-./sample_media_2}:/media2:ro"
      - "${UPLOAD_PATH:-./uploads}:/uploads:ro"
      - "${CURATOR_PROXY_PATH:-./curator_proxies}:/curator:ro"
      - artifacts_data:/artifacts
      - models_cache:/root/.cache
    command: celery -A app worker --queues=gpu --concurrency=1 --loglevel=info --hostname=worker-gpu-2@%h
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker-cpu:
    build:
      context: ./services/worker
    restart: unless-stopped
    # NVENC hardware video encoding for proxy generation. Pin NVENC_GPU_DEVICE_ID to
    # a GPU whose encoder actually opens sessions — on driver 580.x the RTX 5090
    # (GPU 0) rejects NVENC with "unsupported device (2)" while the RTX PRO 6000
    # (GPU 1) encodes fine; CUDA works on both, so only an encode test reveals it.
    # NVIDIA_DRIVER_CAPABILITIES=all so every encoder-related driver lib is injected.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVENC_GPU_DEVICE_ID:-1}"]
              capabilities: [gpu, video, graphics]
    environment:
      <<: *python-env
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${MEDIA_PATH_2:-./sample_media_2}:/media2:ro"
      # rw: link imports (Dropbox etc.) download into /uploads on this worker
      - "${UPLOAD_PATH:-./uploads}:/uploads"
      - "${CURATOR_PROXY_PATH:-./curator_proxies}:/curator:ro"
      - artifacts_data:/artifacts
      - models_cache:/root/.cache
    command: celery -A app worker -B --queues=cpu,ingest --concurrency=4 --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Graphics worker: drives the host's ComfyUI over HTTP. No GPU reservation —
  # ComfyUI owns the GPUs; this container just submits workflows and collects
  # output files. Concurrency 2 lets one job render while another waits in queue.
  worker-graphics:
    build:
      context: ./services/worker
    restart: unless-stopped
    environment:
      <<: *python-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${COMFY_WORKFLOWS_PATH:-./comfy_workflows}:/workflows:ro"
      - artifacts_data:/artifacts
    command: celery -A app worker --queues=graphics --concurrency=2 --loglevel=info --hostname=worker-graphics@%h
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── File watcher ─────────────────────────────────────────────────────────────
  watcher:
    build:
      context: ./services/watcher
    restart: unless-stopped
    environment:
      <<: *python-env
      API_URL: "http://api:8000/api"
      # Opt-in Curator-direct ingest: set CURATOR_DIRECT_INGEST=1 in .env to
      # also watch /curator — only the *_video.mp4 per proxy folder is
      # ingested (see watcher._should_ingest). Unset = previous behavior.
      MEDIA_ROOTS: "/media:/media2${CURATOR_DIRECT_INGEST:+:/curator}"
    volumes:
      - "${MEDIA_PATH:-./sample_media}:/media:ro"
      - "${MEDIA_PATH_2:-./sample_media_2}:/media2:ro"
      - "${CURATOR_PROXY_PATH:-./curator_proxies}:/curator:ro"
    depends_on:
      api:
        condition: service_healthy

  # ── Frontend + nginx ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: artifacts/frontend/Dockerfile.production
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      api:
        condition: service_healthy
